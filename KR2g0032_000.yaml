body:
  text: 唐才子傳傳記類三總錄之屬提要臣等謹案唐才子𫝊八巻元辛文房撰文房字良史西域人其始末不見於史𫝊惟陸友仁研北雜志稱其能詩與王執謙齊名蘇天爵元文類中載其蘇小小歌一篇耳是書原本凡十巻總三百九十七人下至妓女女道士之類亦皆載入其見於新舊唐書者僅百人餘皆從𫝊記説部各書采葺其體例因詩繫人故有唐名人非卓有詩名者不錄即所載之人亦多詳其逸事及著作之𫝊否而於功業行誼則祇撮其梗概葢以論文為主不以記事為主也大抵於初盛稍略中晚以後漸詳至李建勲孫魴沈彬江為廖圖熊皦孟賔于孟貫陳搏之倫均有専𫝊則并下􅊶五代矣考楊士竒東里集有是書跋是明初尚有完帙故永樂大典目錄於𫝊字韻内載其全書今𫝊字一韻適佚世間遂無𫝊本然幸其各韻之内尚雜引其文今隨條摭拾裒輯編次共得二百三十四人又附𫝊者四十四人共二百七十八人謹依次訂正釐為八巻按楊士竒跋稱是書凡行事不闗大體不足為勸戒者不錄又稱雜以臆説不盡可據今考編中如許渾𫝊稱其夢遊崑崙李羣玉𫝊稱其夢見神女雜采孟棨本事詩范攄雲溪友議荒唐之説無當史裁又如儲光羲汚祿山偽命而稱其養浩然之氣尤乖大義他如謂駱賔王與宋之問唱和靈隠寺中謂中興間氣集為髙適所選謂李啇隠曽為廣州都督謂唐人效杜甫者惟唐彦謙一人乖舛不一而足葢文房抄掇繁實或未暇檢詳故謬誤牴牾往往雜見然較計有功唐詩紀事叙述差有條理文筆亦秀潤可觀𫝊後間綴以論掎摭詩家利病亦足以津逮藝林於學詩考訂之助固不為無補焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:89723e407785a2beb1b93d825a64283204d00d482624ceac4b7bdc375d394155
