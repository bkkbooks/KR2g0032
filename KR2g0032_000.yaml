body:
  text: 唐才子傳傳記類三總録之屬提要臣等謹案唐才子傳八卷元辛文房撰文房字良史西域人其始末不見於史傳惟陸友仁研北雜志稱其能詩與王執謙齊名蘇天爵元文類中載其蘇小小歌一篇耳是書原本凡十卷總三百九十七人下至妓女女道士之類亦皆載入其見於新舊唐書者僅百人餘皆從傳記説部各書采葺其體例因詩繫人故有唐名人非卓有詩名者不録即所載之人亦多詳其逸事及著作之傳否而於功業行誼則祇撮其梗概蓋以論文為主不以記事為主也大抵於初盛稍略中晚以後漸詳至李建勳孫魴沈彬江為廖圖熊皎孟賔于孟貫陳搏之倫均有専傳則并下􅊶五代矣考楊士竒東里集有是書跋是明初尚有完帙故永樂大典目録於傳字韻內載其全書今傳字一韻適佚世間遂無傳本然幸其各韻之內尚雜引其文今隨條托拾裒輯編次共得二百三十四人又附傳者四十四人共二百七十八人謹依次訂正釐為八卷按楊士竒跋稱是書凡行事不關大體不足為勸戒者不録又稱雜以臆説不盡可據今考編中如許渾傳稱其夢遊崑崙李羣玉傳稱其夢見神女雜采孟棨本事詩范攄雲溪友議荒唐之説無當史裁又如儲光羲汚祿山偽命而稱其養浩然之氣尤乖大義他如謂駱賔王與宋之問唱和靈隱寺中謂中興間氣集為髙適所選謂李啇隱曽為廣州都督謂唐人效杜甫者惟唐彥謙一人乖舛不一而足蓋文房抄掇繁實或未暇檢詳故謬誤抵牾往往雜見然較計有功唐詩紀事敘述差有條理文筆亦秀潤可觀傳後間綴以論掎托詩家利病亦足以津逮藝林於學詩考訂之助固不為無補焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d43ead6de3adf16ca9a3bb7a8beaa4bfdbca43488c0941dc94cf113475fe0449
