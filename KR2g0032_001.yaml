body:
  text: 唐才子傳卷一元辛文房撰崔信明李百藥王勃楊炯盧照鄰兄光乘駱賔王宋之問沈佺期杜審言孫甫李嶠劉希夷陳子昂張說王翰賀知章張子容王灣李昂孫逖王泠然崔皓劉眘虛祖詠綦毋潛崔國輔儲光羲王昌齡常建陶翰崔信明案新舊唐書信明青州益都人少英敏及長彊記美文章髙孝基語人曰崔生才冠一時但恨位不到耳為堯城令竇建德僭號信明弟仕賊勸信明降節當得美官不肯從遂踰城去隱太行山中貞觀中詔即其家拜興世丞遷秦川令按崔信明傳永樂大典所載止得二條蓋全文已佚矣今謹就原文編録附識于此李百藥按新唐書百藥字重規定州安平人才行天下推服好奬拔後進翰藻沉鬱按此條有闕文王勃按新舊唐書勃字子安絳州龍門人六嵗善辭章未及冠授朝散郎沛王署為府修撰諸王鬬雞㑹勃戲為文檄髙宗聞之怒斥出府既廢父福畤遷交址令勃往省覲途過南昌時都督閻公新造滕王閣成九月九日大㑹賔客將令其壻作記以誇盛事勃至入謁帥知其才因請為之勃欣然對客操觚頃刻而就文不加㸃滿座大驚辭别帥贈百縑即舉帆去勃屬文綺麗請者甚多金帛盈積心織而衣筆耕而食有集三十卷及舟中纂序五卷今行於世勃嘗遇異人相之曰子神强骨弱氣清體羸胸骨虧陷目睛不全秀而不實終無大貴矣溺海時年二十九故其才長而命短者豈非相乎楊炯按新舊唐書炯華隂人博學善屬文六嵗舉神童授校書郎永隆二年皇太子舍奠表豪俊充崇文館學士後為盈川令張說以針贈之戒其苛刻至官以刻稱卒炯恃才憑傲每恥朝士矯飾呼為麒麟楦或問之曰今弄假麒麟戲者必刻畫其形覆驢上宛然異物及去其皮還是驢耳聞者甚不平故為時所忌與王勃盧照鄰駱賔王以文辭齊名海內稱四才子亦曰四傑效之者風靡焉炯曰吾愧在盧前恥居王後論者然之張說曰盈川文如懸河酌之不竭優於盧而不減於王愧在盧前謙也恥在王後信然有盈川集三十卷盧照鄰字升之范陽人調鄧王府典籖王愛重謂人曰此吾之相如也後遷新都尉嬰病去官居太白山草閣得方士𤣥明膏餌之㑹父喪號慟因嘔丹輒出疾愈甚家貧苦貴宦時時供衣藥乃去具茨山下買園數十畝疏潁水周舍復豫為墓偃卧其中自以當髙宗時尚吏已獨儒武后尚法已獨黃老后封嵩山屢聘賢士己已廢著五悲文以自明手足攣緩不起行已十年每春歸秋至雲壑烟郊輒輿出户庭悠然一望遂自傷作釋疾文有云覆燾雖廣嗟不容乎此生亭育雖繁恩已絶乎斯代與親屬訣自沉潁水有詩文二十卷及幽憂子三卷行於世舊唐書曰兄光乘亦知名長夀中為隴州刺史駱賔王義烏人七嵗能賦詩武后時數上疏言事得罪貶臨海丞鞅鞅不得志棄官去文明中徐敬業起兵欲反正往投之署為府屬為敬業作檄𫝊天下暴斥武后罪惡后見讀之矍然曰誰為之或以賔王對后曰有如此才不用宰相過也及敗亡命不知所之後宋之問貶還道出錢塘遊靈隱寺夜月行吟長廊下曰鷲嶺鬱岧嶤龍宫隱寂寥未得下聨有老僧然燈坐禪問曰少年不寐而吟諷甚苦何耶之問曰欲題此寺而思不屬僧笑曰何不道樓觀滄海日門對浙江潮之問終篇曰桂子月中落天香雲外飄捫蘿登塔逺刳木取泉遙雲薄霜初下氷輕葉未凋待入天台路看余度石橋僧一聨篇中警䇿也遲明訪之已不見老僧即賔王也𫝊聞浮海而去矣後中宗詔求其文得百餘篇及詩等十卷命㕁雲卿次序之及百道判集一卷今𫝊於世宋之問按新唐書云之問字延清一名少連汾州人而舊唐書則云虢州𢎞農人偉貌辨給甫冠武后召與楊炯分直習藝館纍轉尚方監丞后遊龍門詔從臣賦詩左史東方虬詩先成后賜錦袍之問俄頃獻后覽之嗟賞更奪袍以賜按此條有闕文沈佺期按新舊唐書佺期字雲卿相州內黃人上元二年鄭益榜進士工五言常侍宫中佺期嘗以詩贈張燕公公曰沈三兄詩清麗須讓居第一也詩名大振自魏建安迄江左詩律屢變至沈約鮑照庾信徐陵以音韻相婉附屬對精緻及佺期之問又加靡麗回忌聲病約句準篇著定格律遂成近體如錦繡成文學者宗尚語曰蘇李居前沈宋比肩謂唐詩變體始自二公猶漢人五字詩始自蘇武李陵也有集十卷今𫝊于世杜審言按新唐書審言字必簡襄州襄陽人預之逺裔咸亨元年宋守節榜進士為隰城尉恃髙才傲世坐事貶吉州司户及武后召還將用之問曰喜否審言舞蹈謝后令賦歡喜稱㫖授著作郎為修文館直學士杜甫其孫也甫按此下有闕文祿山亂避走三川寓鄜彌年棄官客秦州㑹嚴武節度劍南西川往依焉武以世舊待甫甚善親詣其家甫見之或時不巾而性褊躁傲誕嘗醉登武牀瞪視曰嚴挺之乃有此兒武中銜之一日欲殺甫集吏于門武將出冠鈎于簾者三左右走報其母力救得止按本書包融傳論凡唐人中父子兄弟並著才名者辛文房均盛述之知原書于家世有文者皆合為一𫝊甫為審言之孫自應附審言𫝊後謹發其凡于此李嶠按新唐書嶠字巨山趙州贊皇人前與王勃楊炯接中與崔融蘇味道齊名晚諸人沒為文章宿老學者取法焉按此條有闕文劉希夷按舊唐書希夷汝州人美姿容好談笑善彈琵琶飲酒至數斗不醉落魄不拘常檢嘗吟詩曰年年嵗嵗花相似嵗嵗年年人不同宋之問苦愛此一聫知其未𫝊于人懇求之許而竟不與之問怒其誑巳使以土囊壓殺于别舍時未及三十人悉憐之論曰希夷天賦俊爽才情如此想其事業勳名何所不至而為之問壓殺昔者襧衡痛江夏之來倐焉折首夫何殞命以隋侯之珠彈雀所較者輕所失者重玉迸松摧良可惜也况于骨肉相殘者乎陳子昂按新唐書子昂字伯玉梓州射洪人開耀二年許旦榜進士初年十八時未知書以富家子任俠尚氣弋博後入鄉校感悔即於州東南金華山觀讀書痛自修飾精究墳典耽愛黃老易莊光宅元年詣闕上書諫靈駕入京武后召見竒其才遂拜麟臺正字詔云地籍英華文稱暐曄纍遷拾遺子昻貌柔雅而性褊躁輕財好施篤朋友之義與逰英俊多秉鈞衡唐興文章承徐庾餘風天下祖尚子昂始變雅正初為感遇詩三十章王適見而驚曰此子必為海內文宗由是知名有集一卷今𫝊張說按新唐書說字道濟一字說之洛陽人睿宗時兵部侍郎同平章事開元十八年終左丞相說敦氣節重然諾為文精壯長于碑志朝廷大述作多出其手詩法特妙晚謫嶽陽詩益悽惋人謂得江山之助按此條有闕文王翰按新唐書翰字子羽并州晉陽人景雲元年盧逸下進士及第又舉直言極諌又舉超拔羣類科少豪蕩恃才不羈喜縱酒櫪多名馬家蓄妓樂翰發言立意自比王侯日聚英傑從禽擊鼓為歡張嘉貞為本州長史厚遇之翰酒間自歌詩以舞屬嘉貞神氣軒舉張說尤加禮異及輔政召為正字擢駕部員外郎說罷翰出為仙州别駕以窮樂畋飲貶嶺表道卒翰工詩多壯麗之詞文士祖詠杜華等嘗與逰從華母崔氏云吾聞孟母三遷吾今欲卜居使汝與王翰為鄰矣其才如此燕公論其文如瓊杯玉斚雖爛然可珍而多玷缺云有集今𫝊論曰太史恨布衣之俠湮沒無聞以其義在存亡死生之間而不伐其德千金駟馬奚啻草芥信哉名不虛立也觀王翰之氣其若人之儔乎賀知章按舊唐書知章㑹稽永興人以文詞知名性曠夷善談論笑謔陸象先在中書引為太常博士象先與知章最親善常曰季真清談風韻吾一日不見則鄙吝生矣當時賢逹皆傾慕之天寶三年因病夢逰帝居及寤表請為道士求還鄉里即舍住宅為千秋觀上許之詔賜鏡湖剡溪一曲以給漁樵後改為天長觀張子容開元元年常無名榜進士為樂城令初與孟浩然同隱鹿門山為死生交詩篇唱答頗多後值亂離流寓江表嘗送內兄李録事歸故里云十年多難與君同幾處移家逐轉蓬白首相知征戰後青春已過亂離中行人杳杳看西月歸馬蕭蕭向北風漢水楚雲千萬里天涯此别恨無窮後棄官歸舊業王灣開元元年常無名榜進士與學士綦毋潛契切詞翰早著為天下所稱往來吳楚間多有著述如江南意一聨云海日生殘夜江春入舊年詩人以來罕有此作張燕公手題于政事堂每示能文令為楷式曽奉使登終南山有賦志趣髙逺識者不能棄焉李昂開元二年王丘下狀元及第天寶間仕為禮部侍郎知貢舉奬拔寒素甚多按新唐書選舉志開元二十四年考功員外郎李昂為舉人詆訶帝以員外郎望輕遂移貢舉於禮部以侍郎主之禮部選士自此始則昻之知貢舉未協輿論可知原文所云殊非事實工詩有戚夫人楚舞歌篇播𫝊人口真佳作也孫逖博州人幼而有文屬辭警敏援筆成篇開元二年舉手筆俊拔哲人竒士隱淪屠釣及文藻宏麗等科第一人及第𤣥宗引見擢左拾遺集賢殿修撰改考功員外郎遷中書舍人與顔真卿李華蕭頴士皆同時稱海內名士按舊唐書逖𫝊開元二十一年逖始為考功員外郎頻選貢士初年得顔真卿後年得李華蕭穎士考文獻通考開元二十一年至二十三年嵗一試進士科蓋皆逖主之三人者其所取士也又考舊唐書所載開元二十四年逖始遷中書舍人原文未為明晰又此條有闕文並識于此王泠然山東人開元五年裴耀卿下進士授將仕郎守太子校書郎工文賦詩氣質豪爽當言無所回忌卓犖竒才濟世之器惜其不大顯而終有集今𫝊崔皓按新舊唐書皓汴州人書録解題皓開元十年進士好蒱博嗜酒娶妻擇美者稍不愜即棄之凡易三四初李雍聞其才名虛舍邀之皓至獻詩首章云十五嫁王昌雍叱曰小兒無禮天寶中為尚書司勳員外郎少為詩意浮艷多陷輕薄晚節忽變常體風骨凛然一窺塞垣狀極戎旅竒造往往並驅江鮑後遊武昌登黃鶴樓感慨賦詩及李白來曰眼前有景道不得崔皓題詩在上頭無作而去為哲匠斂手皓生平苦吟詠當病起清虛友人戲之曰非子病如此乃苦吟詩瘦耳遂為口實劉眘虛嵩山人姿容秀拔九嵗屬文上書召見拜童子郎開元十一年徐徴榜進士調洛陽尉遷夏縣令性髙古脫略勢利嘯傲風塵後欲卜隱廬阜不果交逰多山僧道侣為詩情幽興逺思雅詞竒忽有所得衆便驚聽當時東南髙唱者數十人聲律宛態無出其右按此條有闕文祖詠按書録解題詠開元十二年進士少與王維為吟侶維在濟州寓官舍贈祖三詩有云結交二十載不得一日展貧病子既深契闊余不淺蓋亦流落不偶極可傷也綦毋潛荆南人按新唐書藝文志注潛字孝通開元十四年嚴迪榜進士授宜夀尉遷右拾遺入集賢院待制復授校書終著作郎與李端同時詩調屹崒峭蒨足佳句善寫方外之情後見兵亂官况日惡挂冠歸隱江東别業王維有詩送之曰明時久不逹棄置與君同天命無怨色人生有素風一時文士咸賦詩祖餞有集一卷行世崔國輔山隂人也開元十四年嚴迪榜進士與儲光羲綦毋潛同時舉縣令纍遷集賢直學士禮部郎中天寶間坐是王鉷近親貶竟陵司馬有文及詩婉孌清楚深宜諷詠樂府短章古人有不能過也初至竟陵與處士陸鴻漸遊三嵗交情至厚謔笑永日又相與較定茶水之品臨别謂羽曰豫有襄陽太守李憕所遺白驢烏犎牛各一頭及盧黃門所遺文槐書函一枚此物皆已之所惜者宜野人乘蓄故特以相贈雅意髙情一時所尚有酬酢之歌詩并集𫝊焉儲光羲兖州人開元十四年嚴迪榜進士有詔中書試文章嘗為監察御史值安祿山陷長安輒受僞署賊平後自歸貶死嶺南工詩格髙調逸趣逺情深削盡常言挾風雅之道養浩然之氣覽者猶聆韶濩音先洗桑濮耳庶幾乎賞音也有集七十卷政論十五卷九經分義疏二十卷並𫝊王昌齡字少伯太原人開元十五年李巖榜進士授泛水尉又中宏辭遷校書郎復以不護細行貶龍標尉以刀火之際歸鄉里為刺史閭丘曉所忌而死後張鎬按軍河南曉愆期將戮之辭以親老乞恕鎬曰王昌齡之親欲與誰養乎曉大慚沮昌齡工詩緒密而思清時稱詩家夫子王江寧蓋嘗為江寧令與文士王之涣辛漸交友至深皆出模範其名重如此有詩集五卷又述作詩格律境思體例共十四篇為詩格一卷又詩中密㫖一卷及古樂府解題一卷今並𫝊論曰自元嘉以還四百年之內曹劉陸謝風骨頓盡逮儲光羲王昌齡頗從厥跡兩賢氣同而體别也王稍聲峻竒句俊格驚耳駭目奈何晚途不矜小節謗議騰沸兩竄遐荒使知音者喟然長歎至歸全之道不亦痛哉常建長安人開元十五年與王昌齡同榜登科大厯授盱眙尉仕頗不如意遂放浪琴酒往來太白紫閣諸峯有肥遁之志嘗採藥山谷中遇女子遍體緑毛自言是秦時宫人亡入山來食松葉遂不饑寒因授建微㫖所養非常後寓鄂渚招王昌齡張僨同隱獲大名當時集一卷今𫝊論曰古稱髙才而無貴仕誠哉是言曩劉楨死于文學鮑照卒于參軍今建亦淪於一尉悲夫建屬思既精詞亦警絶似初發通莊却尋野徑百里之外方歸大道㫖逺興僻能論意表可謂一唱而三嘆矣陶翰潤州人開元十八年崔明允下進士及第次年中博學宏辭與鄭昉同時官至禮部員外郎為詩詞筆雙美既多興義復備風骨三百年以前方可論其裁製大為當時所稱今有集相𫝊唐才子傳卷一
