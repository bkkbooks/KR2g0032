body:
  text: 唐才子傳巻二元辛文房撰王維孟浩然殷遥薛據李頎崔曙張諲李白岑參髙適王之涣包融子何佶閻防丘為盧象韋述張謂賈至沈千運孟雲卿王季友康洽劉長卿韋應物錢起子徽孫珝懐素張繼韓翃郎士元皇甫冉弟曽獨孤及戎昱王維九嵗知屬辭工草𨽻嫻音律岐王重之維將應舉岐王謂曰子詩清越者可録數篇琵琶新聲能度一曲同詣九公主第維如其言是日諸伶擁維獨奏主問何名曰鬱輪袍因出詩巻主曰皆我習諷謂是古作乃子之佳製乎延于上座曰京兆得此生為解頭榮哉力薦之開元十九年狀元及第擢右拾遺遷給事中賊陷兩京駕出幸維扈從不及為所擒服藥稱瘖病禄山愛其才逼至洛陽供舊職拘于普施寺賊宴凝碧池悉召梨園諸工合樂維痛悼賦詩曰萬户傷心生野烟百官何日再朝天秋槐花落空宫裏凝碧池頭奏管絃詩聞行在賊平後偽官皆定罪獨維得免仕至尚書右丞維詩入妙品上上畫思亦然至山水平逺雲勢石色皆天機所到非學而能自作詩云當代謬詞客前身應畫師人評維詩中有畫畫中有詩信哉中嵗喪妻不再娶孤居三十年别墅在藍田縣南輞川亭館相望自寫其景物竒勝日與文士丘為裴迪崔興宗逰覽賦詩琴樽自樂篤志奉佛蔬食素衣後表請舍宅以為寺臨終作書辭親友停筆而化孟浩然按新唐書浩然字浩然襄陽人少好節義詩工五言隠鹿門山即龎公棲隠處也四十逰京師諸名士間嘗集秘省聮句浩然曰㣲雲淡河漢疎雨滴梧桐衆欽服張九齡王維極稱道之維待詔金鑾一旦私邀入商較風雅俄報𤣥宗臨幸浩然錯愕伏匿牀下維不敢隠因奏聞帝喜曰朕素聞其人而未見也詔出再拜帝問曰卿將詩來耶對曰偶不齎即命吟近作誦至不才明主棄多病故人疎之句帝憮然曰卿不求仕朕何嘗棄耶奈何誣我因命放還南山古稱禰衡不遇趙壹無禄觀浩然罄折謙退才名日髙竟淪明代終身白衣良可悲夫其詩文采丰茸經緯綿宻半遵雅調全削凡近所著三巻今𫝊王維畫浩然像于郢州為浩然亭咸通中鄭諴謂賢者名不可斥更曰孟亭今存焉殷遥丹陽人天寶間嘗仕為忠王府倉曹㕘軍與王維結交同慕禪寂志趣髙疎多雲岫之想而苦家貧死不能𦵏一女纔十嵗日哀號于親愛憐之者賵贈埋骨石樓山中工詩詞彩不羣而多警句杜甫嘗稱許之有詩𫝊于今薛據荆南人開元十九年王維榜進士天寶六年又中風雅古調科第一人于吏部㕘選據自恃才名請受萬年録事流外官訴宰執以為赤縣是某等清要據無由得之改涉縣令後仕歴司議郎終水部郎中據為人骨鯁有氣魄文章亦然嘗自傷不得早達造句往往追凌鮑謝初好棲遲居嵩山鍊藥晚嵗置别業終南山下老焉有集今𫝊李頎東川人開元二十三年賈季隣榜進士及第調新鄉縣尉性疎簡厭薄世務慕神仙服餌丹砂期輕舉之道結好塵喧之外一時名輩莫不重之工詩發調既清修辭亦秀雜歌咸善𤣥理最長多為放浪之語足可震蕩心神惜其偉材只到黄綬故其論道家往往髙于衆作有集今𫝊崔曙宋州人按書録解題曙開元二十六年狀元及第少孤貧不應薦辟志况疎爽擇交于方外苦讀書髙栖少室山中與薛據友善工詩言詞欵要情興悲凉送别登樓俱堪淚下有集𫝊于今張諲永嘉人初隠少室山下閉門修肄志甚勤苦不及聲利後應舉官至刑部員外郎明易象善草𨽻兼畫山水詩格髙古與李頎友善事王維為兄皆為詩酒丹青之契維贈詩云屏風誤㸃惑孫郎團扇草書驚内史李頎贈曰小王破體閒支䇿落月梨花照空壁詩堪記室妬風流畫與將軍作勁敵天寳中謝官歸故山偃仰不復來人間矣有詩𫝊世李白山東人母夢長庚星而誕因以命之十嵗通五經夜夢筆頭生花後天才贍逸名聞天下天寶初自蜀至長安道㩦所業投賀知章讀至蜀道難歎曰子謫仙人也乃解金龜換酒終日相樂遂薦于𤣥宗召見金鑾殿論時事因奏頌一篇帝喜賜食親為調羮詔供奉翰林嘗大醉上前草詔使髙力士脫鞾力士恥之晚節好黄老度牛渚磯乗醉捉月遂沉水中按白傳有闕文今就永樂大典所載五條編次岑參南陽人文本之後天寶三年趙岳榜第二人及第累官左補闕起居郎出為嘉州刺史杜鴻漸表置安西幕府拜職方郎中兼侍御史辭罷别業在杜陵山中後終于蜀參累佐戎幕往來鞍馬烽塵間十餘載極征行離别之情城障塞堡無不經行博覽史籍尤工綴文屬詞清迥用心良苦詩調尤髙唐興罕見此作放情山水故常懐逸念竒造幽致所得往往超拔孤秀度越常情與髙適風骨頗同讀之令人慷慨懐感毎篇絶筆人輒𫝊咏至徳中裴休杜甫等常薦其識度清逺議論雅正嘉名早立時輩所仰可以備獻替之官未及大用而謝世豈不傷哉有集十巻行于世杜確為之序云髙適字達夫一字仲武滄州人少性拓落不拘小節恥預常科隠跡博徒才名便逺後舉有道授封丘尉擢諌議大夫負氣敢言權貴側目適尚氣節語王覇衮衮不厭遭時多難以功名自許五十始學為詩即工以氣質自髙多胸臆間語毎一篇已好事者輒𫝊播吟玩嘗過汴州與李白杜甫㑹酒酣登吹臺慷慨悲歌臨風懐古人莫測也中間唱和頗多今有詩文等二十巻及所選至徳迄大厯述作者二十六人詩為中興間氣集二巻並𫝊按適𫝊有闕文王之涣薊門人少有俠氣所從逰皆五陵少年擊劍悲歌從禽縱酒後折節工文十年名譽自振恥困場屋遂交謁名公為詩情致雅暢得齊梁之氣毎有作樂工輒取以被聲律與王昌齡髙適暢當忘形爾汝嘗共詣旗亭有梨園名部至昌齡等曰我輩擅詩名未定甲乙可觀詩伶謳詩以多者為優一伶唱昌齡二絶句一唱適一絶句之涣曰樂人所唱皆下俚之詞須㬰一佳妓唱曰黄河逺上白雲間一片孤城萬仞山羌笛何須怨楊栁春風不度玉門闗復唱二絶皆之涣詞三子大笑曰田舍奴吾豈妄哉諸伶竟不諭其故拜曰肉眼不識神仙三子從之酣醉終日其狂放如此云有詩𫝊于今包融延陵人開元間仕厯大理司直與參軍殷遥孟浩然交厚工為詩二子何佶縱聲雅道齊名當時號三包有詩一巻行世論曰夫人之于學苦心難既苦心成業難成業者獲名不朽兼父子兄弟間尤難厯觀唐人父子如三包六竇張碧張瀛顧况顧非熊章孝標章碣杜審言杜甫錢起錢珝温庭筠温憲弟兄如皇甫冉皇甫曽李宣古李宣逺姚係姚倫等皆聮玉無瑕清塵逺播芝蘭繼芳重難改于父道騷雅接響庶不慊于祖風四難之間揮麈之際亦可以為美談矣何字幼嗣潤州延陵人融之子也與弟佶俱以詩鳴時稱二包天寳七年楊譽榜及第曽師事孟浩然授格法與李嘉祐相友善大厯中仕終起居舍人詩𫝊者可數葢流離世故率多素辭大播芳名亦以當時望族也佶按唐詩紀事佶字㓜正天寳六年楊䕶榜進士累遷祕書監未幾遷刑部侍郎太常少卿拜諫議大夫御史中丞居官謹確所在有聲佶天才贍逸氣宇清深心醉古經神和大雅詩家老斵輪也與劉長卿竇叔向諸公皆莫逆之愛晚嵗沾風痺之疾辭寵樂髙不及榮利卒封丹陽郡公有詩集行于世閻防河中人開元二十二年李琚榜及第顔真卿甚敬愛之欲薦于朝不屈為人好讀書好古博雅詩語真素魂清魄爽放曠山水髙情獨詣于終南山豐徳寺結茅茨讀書百丈溪是其隠處題詩云浪蹟棄人世還山自幽獨始傍巢由蹤吾其獲心曲又云養閒廢人事達命知止足不學魯國儒俟時勞伐輻後信命不務進取以此自終有詩集行世丘為按新唐書藝文志注為蘇州嘉興人天寳初劉單榜進士官至太子右庶子事母孝年八十餘致仕還縣令謁之為候門磬折令坐方拜里胥立庭下既出乃敢坐經縣署降馬而過舉動有禮卒年九十六有集行世盧象字緯卿汶水人鴻之姪也攜家來居江東最乆仕為校書郎左拾遺膳部員外郎授安禄山偽官貶永州司户參軍後為主客員外郎有詩名譽滿秘閣雅而不儉有大體得國士之風集二十巻今𫝊同仕有韋述為桑泉尉時詔求逸書命述等編校于朝元殿後為翰林學士有詩名今亦𫝊焉按盧象為鴻之姪此𫝊本當附鴻𫝊後以鴻入隠逸𫝊與象出處異揆故分編焉張謂字正言河内人也按唐詩紀事謂登天寶二年進士第少讀書嵩山清才㧞萃泛覽流觀不屈于權勢自矜竒骨必談笑封侯二十四受辟從戎營朔十載亭障間稍立功勲以將軍得罪流滯薊門有以非辜雪之者累官為禮部侍郎無幾何出為潭州刺史性嗜酒簡淡樂意湖山工詩格度嚴宻語致精深多擊節之音今有集𫝊于世賈至按新唐書至字㓜鄰陳振孫書録解題則以為字㓜幾洛陽人曽之子也天寶擢第官起居舍人知制誥從幸西蜀當撰𫝊位肅宗冊文既進藁𤣥宗曰先天誥命乃父所為今兹大冊爾又為之兩朝盛典出卿家父子可謂繼美矣按賈至𫝊有關文沈千運吳興人工舊體詩氣格髙古當時士流皆敬慕之號為沈四山人天寶中數應舉不第時年齒已邁遨逰襄鄧間干謁名公來濮上感懐賦詩曰聖朝優賢良草澤無遺族人生各有命在余胡不淑一生但區區五十無寸禄衰落當棄捐貧賤招謗讟其時多難自知屯蹇遂浩然有歸歟之志賦詩曰棲隠非别事所願離風塵不來城邑逰禮樂拘束人又曰如何巢與由天子不得臣遂還山中别業嘗曰衡門之下可以棲遲有薄田園兒稼女織偃仰今古自足此生誰能作小吏走風塵下乎髙適賦還山吟贈行曰還山吟天髙日暮寒山深送君還山識君心人生老大須恣意看君解作一生事山間偃仰無不至石泉淙淙若風雨桂花松子常滿地賣藥囊中應有錢還山服藥又長年白雲勸盡杯中物明月相隨何處眠眠時憶問醒時意夢魂可以相周旋肅宗議備禮徵致㑹卒而罷有詩𫝊世孟雲卿闗西人天寶間不第氣頗難平志亦髙尚懐嘉遯之節與薛據相友善嘗寓荆州杜工部有與雲卿贈答之作甚愛重之工詩其體祖述沈千運漁獵陳拾遺詞氣傷感雖然模效纔得升堂猶未入室然當時古詞無出其右一時之英也如虎豹不相食哀哉人食人又朝亦常苦饑暮亦常苦饑飄飄萬里餘貧賤多是非少年莫逺逰逺逰多不歸皆為當代推服韋應物過廣陵遇孟九贈詩云髙文激頹波四海靡不𫝊西施且一笑衆女安得妍其才名于此可見矣仕終校書郎有集今𫝊論曰雲卿禀通濟之才淪吞噬之俗栖栖南北苦無所遇何生之不辰也身處江湖心存魏闕猶杞國之人憂天墜相率而逃者匹夫之志亦可念矣王季友河南人暗誦書萬巻論必引經家貧賣屐好事者多㩦酒就之其妻栁氏疾季友窮醜遣去來客豐城洪州刺史李公一見傾敬即引佐幕府工詩性磊落不羈愛竒務險逺出常情之外白首短褐﨑嶇士林傷哉貧也嘗有詩云山中誰余宻白髮日相親雀鼠晝夜無知我厨廪貧又自耕自刈食為天如鹿如麋飲野泉亦知世上公卿貴且養丘中草木年觀其篤志山水可謂逺性風疎逸情雲上矣有集𫝊于世康洽酒泉人黄髪美丈夫也盛時攜琴劍來長安謁當道氣度豪爽工樂府詩篇宫女梨園皆寫于聲律𤣥宗亦知名嘗歎美之所出入皆王侯貴主之宅從逰與讌雖駿馬蒼頭如其已有觀服玩之光令人欲惜物憐才乃能如是也後遭天寶亂離飄蓬江表至大歴間年已七十餘龍鍾衰老談及開元繁盛流涕無從往來兩京故侯館穀空咸陽一布衣耳于時文士願與論交李端逢之贈詩云聲名常壓鮑參軍班位不過揚執㦸又云同時獻賦人皆盡共壁題詩君獨在後卒杜陵山中文章不得見矣劉長卿按新唐書藝文志云長卿字文房河間人少居嵩山讀書後移家鄱陽開元中徐徵榜及第歴監察御史出為轉運使判官後觀察使吳仲孺誣奏非罪貶南巴尉㑹有為辨之者量移睦州司馬終隨州刺史長卿清才冠世頗淩浮俗性剛多忤權門故兩逢遷斥人悉寃之詩調雅暢甚能鍊飾其自賦傷而不怨足以發揮風雅權徳輿稱為五言長城嘗謂今人稱前有沈宋王杜後有錢郎劉李李嘉祐郎士元何得與余並驅毎題詩不言姓但書長卿天下無不知其名者有詩集賦文𫝊世章應物按書録解題應物京兆人尚俠初以三衛郎事𤣥宗後始折節讀書為性髙潔鮮食寡欲所居必焚香掃地而坐㝠心象外按此𫝊有闕文錢起字仲文吳興人天寶十年李巨卿榜及第少聰敏承鄉曲之譽初從計吏至京口客舍月夜閒歩聞户外有行吟聲哦曰曲終人不見江上數峰青凡再三往來起遽從之無所見矣怪之及就試粉闈詩題乃湘靈鼓瑟起綴就即以鬼謡十字為落句主文李暐深嘉美擊節吟味乆之曰是必有神助之耳遂擢置髙第釋褐授校書郎嘗採箭竹奉使入蜀除考功郎中大厯中為太清宫使翰林學士起詩體製新竒理致清贍芟宋齊之浮㳺削梁陳之曼靡迥然獨立也王右丞許以髙格與郎士元齊名士林語曰前有沈宋後有錢郎集十巻今傳子徽孫珝並能詩外甥懷素善書一門之中藝名森出可尚矣論曰凡唐人燕集祖送必探題分韻賦詩于衆中推一人擅場者劉相巡察江淮詩人滿坐而起擅場郭曖尚主盛㑹李端擅場緬懐盛時往往文㑹羣賢畢集觥籌亂飛遇江山之佳麗繼歡好于疇昔良辰美景賞心樂事于斯能并矣况賔無絶纓之嫌主無投轄之困歌䦨舞作㣲聞香澤冗長之禮豁畧去之王公不覺其大韋布不覺其小忘形爾汝促席談諧吟咏繼來揮毫驚座樂哉古人有秉燭夜逰所謂非淺同宴一室無及于亂豈不盛也至若殘盃冷炙一獻百拜察喜怒于眉睫之間者可以休矣珝按唐詩紀事珝字端文吳興人起之孫也乾寧六年鄭藹榜及第昭宗時仕為中書舍人工詩有集𫝊于世張繼字懿孫襄州人天寶十二年禮部侍郎楊浚下及第與皇甫冉有髫年之故契逾昆玉早振詞名初來長安頗矜氣節有感懐詩云調與時人背心將静者論終年帝城裏不識五侯門嘗佐鎮戎軍幕府又為鹽鐵判官大歴間仕終檢校祠部郎中繼博覽有識好談論知治體亦嘗領郡輒有政聲詩情爽激多金玉音蓋其累代詞伯積襲弓裘其于為文不雕不飾丰姿清迥有道者風集一巻今𫝊韓翃字君平南陽人天寶十三年楊紘榜進士侯希逸素重其才至是表佐淄青幕府罷閒居十年及李勉在宣武復辟之徳宗時制誥闕人中書兩進除目御筆不㸃再請之批曰與韓翃時有同姓名為江淮刺史宰相請孰與上復批曰春城無處不飛花韓翃也俄以駕部郎中知制誥終中書舍人翃工詩興致繁富如芙蓉出水一篇一詠朝士珍之比諷深于文房筋節成于茂政當時盛稱焉有詩集五巻行于世郎士元字君胄中山人也天寶十五載盧庚榜進士寶應初選京畿縣官詔試政事中書補渭南尉歴左拾遺出為郢州刺史與員外郎錢起齊名時朝廷自丞相以下出牧奉使無兩君詩文祖餞人以為愧其珍重如此二公體調大扺欲同就中郎君稍更閑雅逼近康樂珠聮玉映不覺成編掩映時流名不虚矣有别業在半日吳村王季友錢起等皆見題詠毎誇勝絶詩集今𫝊于世皇甫冉字茂政安定人避地來寓丹陽耕山釣湖放適閒淡或云秘書少監彬之姪也十嵗能屬文張九齡一見歎以清才天寶十五年盧庚榜進士調無錫尉營别墅陽羨山中大歴初王縉為河南節度辟掌書記後入為左金吾衛兵曹參軍仕終拾遺左補闕冉自擢桂禮闈便稱髙格往以世道艱虞避地江外故多飄薄之歎毎文章一到朝廷而作者變色當年才子悉願締交推為宗伯至其造語𤣥㣲端可平揖沈謝雄視潘張惜乎長轡未騁芳蘭早凋良可痛哉有詩集三巻獨孤及為序今𫝊弟曾曽字孝常冉之弟也天寶十七年楊儇榜進士善詩出王維之門與兄名望相亞當時以比張氏景陽孟陽恊居上品載處下流侍御補闕文詞亦然體製清潔華不勝文為士林所尚仕歴侍御史後坐事貶舒州司馬量移陽翟令有詩一巻傳于世獨孤及按此𫝊有闕文考新唐書及字至之河南洛陽人性孝友喜鑒拔為文必彰明善惡長于議論工詩格調髙古風神迥絶得大名當時有集𫝊世論曰嘗讀選中沈謝諸公詩有題新安江水至清淺深見底貽京邑㳺好及石門新營所住四面髙山迴溪石瀬修竹茂林及田南樹園激流植援齋中讀書南樓中望所遲客晚登三山還望京邑等數端皆竒崛精當冠絶古今曽無發其韞奥者逮盛唐沈宋獨孤及李嘉祐韋應物等諸才子集中往往各有數題片言不茍皆不減其風度此則無𫝊之妙逮元和以下佳題尚罕况于詩乎立題乃詩家切要貴在卓絶清新言簡而意足句之所到題必盡之中無失節外無餘語此可與智者商㩁云因舉而論之戎昱荆南人美風度能談少舉進士不第乃放逰名都雖貧士而軒昂氣不消沮愛湖湘山水來客時李䕫亷察桂林寓官舍月夜聞隣居行吟之音清麗遲明訪之乃昱也即延為幕賓待之甚厚崔中丞亦在湖南愛之有女國色欲以妻昱而不喜其姓戎能改則訂議昱聞之以詩謝云千金未必能移姓一諾從來許殺身自謂李大夫恩私至深無任感激初事顔平原嘗佐其征南幕亦累薦之衛伯玉鎮荆南辟為從事歴䖍州刺史至徳中以罪謫為辰州刺史後客劔南寄家隴西數載憲宗時邊烽累急大臣議和親上曰比聞一詩人姓名稍僻者為誰宰相對以冷朝陽包子虚皆非帝舉其詩對曰戎昱也上曰嘗記其詠史云漢家青史上計拙是和親社稷依明主安危託婦人豈能將玉貎便擬静沙塵地下千年骨誰為輔佐臣因笑曰魏絳何其懦也此人如在可與武陵桃花源足稱其清詠士林榮之昱詩在盛唐格氣稍劣中間有絶似晚作然風流綺麗不虧政化當時賞音喧𫝊翰苑固不誣矣有集今𫝊唐才子傳巻二
