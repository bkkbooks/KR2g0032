body:
  text: 唐才子傳卷五元辛文房撰杜牧嚴惲張曙子荀鶴楊發李逺許渾雍陶賈馳李商隱溫庭筠紀唐夫子憲劉得仁薛逢趙嘏李宣古弟宣逺姚鵠項斯馬戴孟遲薛能任蕃杜牧字牧之京兆人也善屬文太和二年韋籌榜進士與厲𤣥同年初未第來東都時主司為侍郎崔郾太學博士吳武陵䇿蹇進謁曰侍郎以峻德偉望為明君選才僕敢不薄施塵露向偶見文士十數輩揚眉扺掌共讀一卷文書覽之乃進士杜牧阿房宫賦其人王佐才也因出卷搢笏朗誦之郾大加賞曰請公與狀頭郾曰已得人矣曰不得即請第五人更否則請以賦見還辭容激厲郾曰諸生多言牧踈曠不拘細行然敬依所教不敢易也後又舉賢良方正科後人評牧詩如銅丸走坂駿馬注坡謂圓快奮急也牧美容姿好歌舞風情頗張不能自遏按此處有闕文時淮南稱繁盛不減京華且多名姬絶色牧恣心逰賞牛相收街吏報杜書記平安帖子至盈篋後以御史分司洛陽時李司徒閒居家妓為當時第一宴朝士以牧風憲不敢邀牧因遣諷李使召已既至曰聞有紫雲者妙歌舞孰是即贈詩曰華堂今日綺筵開誰喚分司御史來忽發狂言驚四座兩行紅粉一時回意氣閒逸傍若無人座客莫不稱異太和末往湖州近城一女子方十餘嵗約以十年後吾來典郡當納之結以金幣洎周墀入相牧上箋乞守湖州比至已十四年前女子從人兩抱雛矣賦詩曰自恨尋芳去較遲不須惆悵怨芳時如今風擺花狼籍緑葉成隂子滿枝此其大槩如此凡所牽繫情見乎辭别業在樊川有樊川集二十卷及注孫子並𫝊同時有嚴惲字子重工詩與牧友善以問春詩得名昔聞有集今無之矣牧子荀鶴荀鶴字彥之牧之微子也牧㑹昌末自齊安移守秋浦時妾有娠出嫁長林鄉正杜筠生荀鶴早著詩名嘗謁梁王朱全忠與之坐忽無雲而雨王以為天泣不祥命作詩稱意王喜之荀鶴寒畯連敗文場甚苦至是遣送名春官大順二年裴贄侍郎下第八人登科正月十日放榜正荀鶴生朝也王希羽獻詩曰金榜曉懸生世日玉書潜記上升時九華山色髙千尺未必髙於第八枝荀鶴居九華峯號九華山人張曙拾遺亦工詩又同年嘗醉謔曰杜十五大榮而得與曙同年荀鶴曰是公榮天下只知有荀鶴若箇知有張五十郎邪各大笑而罷宣州田頵甚重之常致箋問梁王立薦為翰林學士遷主客員外郎頗恃勢侮慢縉紳為文多主針刺衆怒欲殺之未得天祐元年卒荀鶴苦吟平生所志不遂晚始成名况丁亂世殊多憂惋思慮之語於一觴一詠變俗為雅極事物之情足丘壑之趣非易能及者也與太常博士顧雲初隱一山登第之明年寧親相㑹雲撰集其詩三百餘篇為唐風集三卷且序以為壯語大言則决起逸發可以左攬工部袂右拍翰林肩吞賈喻八九於胸中曽不芥蒂或情發乎中則極思冥搜神逰希夷形兀枯木五聲勞於呼吸萬象貧于抉剔信詩家之雄傑者矣荀鶴嗜酒善彈琴風情雅度千載猶可想望也楊發太和四年禮部侍郎鄭浣下第二人及第工詩亦當時聲韻之偉者略舉一篇宿黃花館云孤館蕭條槐葉稀暮蟬聲隔水聲微年年為客路長在日日送人身未歸何處離鴻迷浦月誰家愁婦搗寒衣夜深不卧簾猶捲數㸃殘螢入户飛俱瀏亮清新頗驚凡聽恨其出處事跡不得而知也有詩𫝊世尚多論曰禮樂之學何世無之周羅㬋虎將也而能不失事舊主之儀楊發健吏也而能抗改作神主之議楊收博學精辨其議音律之變與旗常之藏誠不謬於古然運丁叔季制行出處皆不能盡合中道位愈髙則禍愈大古稱知禮樂之情者能作知禮樂之文者能述夫皆知禮樂之文者歟李逺按唐詩紀事逺字宣古太和五年杜陟榜進士及第蜀人也少有大志逺邁流俗為詩多逸氣五彩成文早厯下邑詞名卓然宣宗時宰相令狐綯進奏擬逺杭州刺史上曰朕聞逺詩有青山不厭千杯酒白日惟銷一局棊是踈放如此豈可臨郡理人綯曰詩人託此以寫髙興耳未必實然上曰且令往觀之至果有治聲性簡儉嗜啖鳬鴨貴客經過無他贈厚者緑頭一雙而已後厯忠建江三州刺史仕終御史中丞初牧湓城求天寶遺物得秦僧收楊妃襪一裲珍襲呈諸好事者㑹李羣玉校書自湖湘來過九江逺厚遇之談笑永日羣玉話及向賦黃陵廟詩動朝雲暮雨之興殊亦可怪逺曰僕自獲凌波片玉軟輕香窄每日一見未嘗不在馬嵬下也遂更相戲笑各有賦詩後來頗為法家所短蓋多情少束亦徒以微辭相感動耳有詩集一卷今𫝊許渾字仲晦潤州丹陽人圉師之後也太和六年李圭榜進士為當塗太平二縣令少苦學勞心有清羸之疾至是以伏枕免久之起為潤州司馬大中三年拜監察御史厯虞部員外郎睦郢二州刺史嘗分司朱方買田築室後抱病退居丁卯澗橋村舍暇日綴録所作因以名集渾樂林泉亦慷慨悲歌之士登髙懷古已見壯心故其格調豪麗猶强弩初張牙淺弦急懼無留意耳至今慕者極多家家自謂得驪龍之照夜也早嵗嘗逰天台仰看瀑布旁眺赤城辨方廣于非煙躡石橋于懸壁登陟兼晨窮覽幽勝朗誦孫綽古賦傲然有思歸之想志存不朽再三信宿倣徨不能去以王事不果有負初心後晝夢登山有宫闕淩虛問曰此崑崙也少頃逺見數人方飲招渾就坐暮而罷一佳人出箋求詩未成夢破後吟曰曉入瑶臺露氣清庭中惟見許飛瓊塵心未斷俗緣在十里下山空月明他日復夢至山中佳人曰子何題余姓名於人間遂改為天風吹下步虛聲曰善矣渾才思翩翩仙子所愛夢寐求之一至於此昔子建賦洛神人以徒聞虛語以是為迂誕不信矣未幾遂卒有詩三卷今𫝊雍陶字國鈞成都人工于詞賦少貧遭蜀中亂後播越羇旅有詩云貧當多病日閒過少年時太和八年陳寬榜進士及第一時名輩咸偉其作然恃才傲睨薄於親黨其舅雲安劉欽之下第歸三峽却寄陶詩云地近衡陽雖少鴈水連巴蜀豈無魚陶得詩頗愧赧遂通問不絶大中六年授國子毛詩博士與賈島殷堯藩無可徐凝章孝標友善以琴樽詩翰相娛留長安中大中末出刺簡州時名益重自比謝宣城栁吳興國初諸人詩奴耳賓至必佯狂挫辱投贄者少得通秀才馮道明時稱機捷因罷舉請謁紿閽者曰與太守有故陶倒屣及見呵責曰與足下素昧平生何故之有馮曰誦公詩文室邇人逺何隔平生吟陶詩數聫如立當青草人先見行近白蓮魚未知又閒門客到常如病滿院花開未是貧又江聲秋入峽雨色夜侵樓等句陶多其慕已厚贈遣之自負如此後為雅州刺史郭外有情盡橋乃分襟祖别之所因送客陶怪之遂於上立候館改名折栁橋取古樂府折楊栁之義題詩曰從來只有情難盡何事呼為情盡橋自此改名為折栁任地離恨一條條甚膾炙當時竟辭榮閒居廬嶽養疴傲世與塵事日冥矣賈馳太和九年鄭確榜進士初負才質蹭蹬名場往來公卿間擔簦躡屩莫伸其志嘗入關賦詩云河上微風來關頭樹初濕今朝關城吏又見孤客入上國誰與期西來徒自急主司聞之頗有憐才之意遂放第不甚顯宦詩文俱得美聲後來文士集中多稱賈先輩其名譽為時所重云有集𫝊世李商隱字義山按新舊唐書商隱懷州河內人令狐楚竒其才使逰門下授以文法遇之甚厚開成二年髙鍇知貢舉楚善於鍇奬譽甚力遂擢進士又中拔萃楚又奏為集賢校理楚出王茂元鎮河陽素愛其才表掌書記以子妻之除侍御史茂元為李德裕黨士流嗤謫商隱以為詭薄無行共排擯之來京師久不調更依桂林總管鄭亞府為判官後隨亞謫循州三年始回按商隱樊南乙集自序云余為桂林從事日常使南郡明年正月自南郡歸二月府貶選為盩厔尉尹即留假參軍事典章奏考商隱自嶺表歸朝即為京兆尹盧𢎞正掾曺其在嶺表朞年耳原文及新舊唐書並誤歸窮於宰相綯綯惡其忘家恩放利偷合從小人之辟謝絶殊不展分重陽日因詣㕔事留題云十年泉下無消息九日樽前有所思又云郎君官貴施行馬東閣無因許再窺綯見之惻然乃補太學博士栁仲郢節度東川辟為判官商隱亷介可畏出為廣州都督人或袖金以贈商隱曰吾自性分不可易非畏人知也未幾入拜檢校吏部員外郎罷客滎陽卒按新唐書栁仲郢節度劒南東川辟商隱為判官檢校工部員外郎府罷客滎陽卒則員外郎係判官帶䘖並非入拜亦非吏部也又商隱亦未為廣州都督原文全誤商隱工詩為文瑰邁竒古辭難事隱及從楚學儷偶長短而繁縟過之每屬綴多檢閲書册左右鱗次號獺祭魚而㫖能感人人謂其橫絶前後時溫庭筠段成式各以穠緻相夸號三十六體後評者謂其詩如百寶流蘇千絲鐵網綺密瓌妍要非適用之具斯言信哉初得大名薄逰長安尚希識面因投宿逆旅有衆客方酣飲賦木蘭花詩就呼與坐不知為商隱也後成一篇云洞庭波冷曉侵雲日日征帆送逺人幾度木蘭船上望不知原是此花身客問姓名大驚稱罪時白樂天老退極喜商隱文章曰我死後得為爾兒足矣白死數年生子遂以白老名之既長殊鄙鈍溫飛卿戲曰以爾為侍郎後身不亦忝乎後更生子名衮師聰俊商隱詩云衮師我嬌兒英秀乃無匹此或其後身也商隱文自成一格後學者重之謂西崑體也有樊南甲集二十卷乙集二十卷玉溪生詩三卷初自號玉溪子又賦一卷文一卷並𫝊於世溫庭筠字飛卿舊名岐并州人宰相彥博之孫也少敏悟天才雄贍能走筆萬言善鼓琴吹笛云有弦即彈有孔即吹何必爨桐與柯亭也側詞艷曲與李商隱齊名時號溫李才情綺麗尤工律賦每試押官韻燭下未嘗起草但籠袖慿几每一韻一吟而已場中曰溫八吟又謂八義手成八韻名溫八義多為鄰鋪假手然薄行無檢幅與貴胄裴誠令狐滈等飲博後中夜醉詬狹斜間為邏卒折齒訴不得理舉進士數上又不第出入令狐相國書館中待遇甚優時宣宗喜歌菩薩蠻綯假其新撰進之戒令勿泄而遽言於人綯又嘗問玉條脫事對以出南華經且曰非僻書相公燮理之暇亦宜覽古又有言曰中書省內坐將軍譏綯無學由是漸踈之自傷云因知此恨人多積悔讀南華第二篇徐商鎮襄陽辟巡官不得志逰江東大中末山北沈侍郎主文特詔庭筠試於簾下恐其潜救是日不樂逼暮先請出仍獻啓千餘言詢之已占授八人矣執政鄙其所為留長安中待除宣宗微行遇於傳舍庭筠不識傲然詰之曰公非司馬長史之流乎又曰得非六參簿尉之類帝曰非也後謫方城尉中書舍人裴坦當制忸怩含毫久之詞曰孔門以德行居先文章為末爾既早隨計吏宿負雄名徒誇不羈之才罕有適時之用放騷人於湘浦移賈誼於長沙尚有前席之期未爽抽毫之思庭筠之官文士詩人爭賦詩祖餞惟紀唐夫擅場曰鳯凰詔下雖霑命鸚鵡才髙却纍身唐夫舉進士有詞名庭筠仕終國子助教竟流落而死今有漢南真藁十卷握蘭集三卷金筌集十卷詩集五卷及學海三十卷又採茶録一卷及著乾􅍧子一卷序云不爵不觥非炮非炙能說諸心庶乎乾􅍧之義並𫝊於世子憲憲庭筠之子也龍紀元年李瀚榜進士及第去為山南節度府從事大著詩名詞人李巨川草薦表盛述憲先人之屈其略曰蛾眉先妬明妃為去國之人猿臂自傷李廣乃不侯之將上讀表惻然稱美時宰臣亦有知者曰父以竄死今孽子宜稍振之以厭公議庶幾少雪忌才之恨上頷之後遷至郎中卒有集文賦等𫝊於世劉得仁出入舉場二十年竟無所成投跡幽隱未嘗耿耿有寄所知詩云外族帝皇是中朝親故稀翻令浮議者不許九霄飛憂而不困怨而不怒哀而不傷鏗鏘金玉難合同流而不厭于磨淬端能確守格律揣治聲病甘心窮苦不汲汲于富貴王孫公子中千載求一人不可得也薛逢按舊唐書逢字陶臣河東人書録解題逢㑹昌元年進士晚年岨峿宦途嘗䇿羸赴朝值新進士榜下綴行而出呵殿赫然見逢行李蕭條前導曰回避新郎君逢囅然因遣一介語之曰報道莫貧相阿婆三五少年時也曾東塗西抹來其人辟易案此𫝊有闕文論曰逢天資本髙學力亦贍故不甚苦思而自有豪逸之態第長短皆率然而成未免失淺露俗蓋亦當時所尚非離羣絶俗之詣也夫道家三寶其一不敢為天下先前人者孰肯後之加人者孰能受之觀逢恃才怠傲恥在喧卑而喋喋唇齒亦猶惡醉而强酒也纍擯逺方寸進尺退至龍鍾而自憤不已蓋禍福無不自已者焉有詩集十卷又别紙十三卷賦集十四卷今並行趙嘏字承祐山陽人㑹昌二年鄭言榜進士大中中仕為渭南尉一時名士大夫極稱道之卑宦不如意宣宗雅知其名因問宰相趙嘏詩人曾為好官否可取其詩進來讀其卷首題秦詩云徒知六國隨斤斧莫有羣儒定是非上不悅事寢嘏嘗秋晚賦詩曰殘星幾㸃鴈橫塞長笛一聲人倚樓杜牧之呼為趙倚樓賞歎之也又初有詩落句云早晚粗酬身事了水邉歸去一閒人仕塗􅑾杌豈其䜟也嘏豪邁爽逹多陪接卿相出入館閣如親屬然能以書生令逺近知重所謂一夕名動京師三日𫝊滿天下有自來矣命霑仙尉追蹤梅市亦不惡耳先嘏家浙西有美姬溺愛及計偕留侍母㑹中元遊鶴林寺浙帥窺見悅之奪歸明年嘏及第自傷賦詩曰寂寞堂前日又曛陽臺去作不歸雲當時聞說沙吒利今日青娥屬使君帥聞之殊慘慘遣介送姬入長安時嘏方出關途次橫水驛於馬上相遇姬因抱嘏痛哭信宿而卒遂葬于橫水之陽嘏思慕不已臨終日有所見時方四十餘今有渭南集及編年詩二卷悉取十三代史事迹自始生至百嵗嵗賦一首二首總得一百一十章今並行于世李宣古字埀後澧陽人㑹昌三年盧肇榜進士又試中宏辭工文極俊有詩名性謔浪多所譏誚時杜悰尚主出守澧陽宣古在館下數陪宴賞諧慢既深悰不能忍忿其戲巳辱之使卧泥中衣冠顛倒岐陽公主素惜其才勸曰尚書獨不念諸郎學文待士如此那得平陽之譽乎遣人扶起更以新服赴中座使宣古賦詩謝曰紅燈初上月輪髙照見堂前萬朵桃觱栗調清銀象管琵琶聲亮紫檀槽能歌姹女顔如玉解飲蕭郎眼似刀爭奈夜深拋要令舞來挼去使人勞杜公賞之後悰二子裔休儒休皆中第人曰非母賢待師不足成其子今諸集中往往載其作有英氣調頗清麗惜不多見竟薄命無組綬之譽落寞自終弟宣逺亦以詩名今傳者可數也姚鵠字居雲㑹昌三年禮部尚書王起下進士多出入當時好士公卿之席幕然吏才文價俱不甚超一名僅爾流播亦多幸矣詩一卷今𫝊項斯字子遷江南人也㑹昌四年王起下第二人進士官潤州丹徒縣尉卒於任所開成之際聲價藉甚特為張水部所知賞故其詩格頗與水部相類清妙竒絶鄭少師薰贈詩云項斯逢水部誰道不關情斯性踈曠溫飽非其本心初築草廬于朝陽峯前交結靜者盤薄巖林戴蘚花冠披鶴氅就松隂枕白石飲清泉長哦細酌凡如此三十餘年晚汙一名殊屈清致其警聫如病嘗山藥遍貧起草堂低如客來因月宿床勢向山移下第云獨存過江馬彊拂看花衣病僧云不言身後事猶坐病中禪又湖山萬叠翠門樹一行春又一燈愁裏夢九陌病中春又如月明古寺客初到風度閒門僧未歸又宫人入道云將敲碧落新齊磬却進昭陽舊賜筝之類不一而足當時盛稱楊敬之祭酒贈詩云幾度見君詩總好及觀標格過于詩平生不解藏人善到處逢人說項斯其名以此益彰矣集一卷今行馬戴按新唐書藝文志注云戴字虞臣唐詩紀事云戴㑹昌五年進士苦家貧祿仕代耕嵗廪殊薄然終日吟事清虛自如秋思一絶曰萬木秋霖後孤山夕照餘田園無嵗計寒近憶樵漁按此條有闕文孟遲字逹之平昌人㑹昌五年易重榜進士有詩名尤工絶句風流嫵媚皆宫商金石之聲與顧非熊甚相得且同年有詩一卷行于世薛能字太拙汾州人㑹昌六年狄慎思榜登第大中末書判入等中選補盩厔尉辟太原陕虢河陽從事李福鎮滑臺表為觀察判官歷侍御史都官刑部員外郎福徙帥西蜀奏以自副咸通中攝嘉州刺史造朝遷主客度支刑部郎中俄為同州刺史京兆大尹出帥感化入授工部尚書復節度徐州徙鎮忠武廣明元年徐軍戍溵水經許能以軍多懷舊惠館待于城中許軍懼見襲大將周岌乘衆疑怒因為亂逐能據城自稱留後數日殺能并屠其家能治政嚴察絶請謁耽癖於詩日賦一章為課性喜淩人格律卑卑亦無甚髙論嘗以第一流自居罕所拔拂時劉得仁擅雅稱持詩卷造能能以句謝云千首如一首卷初如卷終蓋譏其無變體也量人如此非厚德君子晚節尚浮屠奉法唯謹資性傲忽又多佻輕忤世及為藩鎮每易武吏嘗命其子屬櫜鞬雅拜新進士或問其故曰渠消弭災咎耳今有集十卷及繁城集一卷𫝊焉任蕃㑹昌間人家江東多逰㑹稽苕霅間初亦舉進士之京不第榜罷進謁主司曰僕本寒鄉之人不逺萬里手遮赤日步來長安取一第榮父母不得侍郎豈不聞江東一任蕃家貧吟苦忍令其去如來日也敢從此辭彈琴自娛學道自樂耳主司慚欲留不可得歸江湖專尚聲調去逰天台巾子峯題寺壁間云絶頂新秋生夜凉鶴翻松露滴衣裳前峯月照一江水僧在翠微開竹房既去百餘里欲回改作半江水行至題處他人已改矣後復有題詩者亡其姓名曰任蕃題後無人繼寂寞空山二百年才名類是凡作必使人改視易聽如洛陽道云憧憧洛陽道塵下生春草行者豈無家無人在家老雞鳴前結束爭去恐不早百年路傍盡白日車中曉求富江海狹取貴山嶽小熱中赴長途奔走何由了想蕃風度此亦足舉其梗槩有詩七十七首為一卷今𫝊非全文矣唐才子傳卷五
