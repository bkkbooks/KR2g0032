body:
  text: 唐才子傳巻六元辛文房撰曹鄴鄭嵎劉駕李頻李羣玉李郢儲嗣宗曹唐鄭巢于武陵高駢李昌符汪遵翁綬沈光邵謁司空圖崔道融聶夷中許棠周繇張演皮日休鄭谷張喬胡曾來鵬李山甫趙光遠盧弼趙牧劉光遠牛嶠曹鄴字業之桂林人累舉不第為四怨三愁五情詩雅道甚古特為舍人韋慤所知力薦於禮部侍郎裴休大中四年張温琪榜中第看榜日上主司詩云一辭桂巖猿九泣都門月年年孟春至看花如看雪杏園宴間呈同年云岐路不在天十年行不至一旦公道開青雲在平地又云忽忽出九衢童僕顏色異故衣未及換尚有去年淚又云永持共濟心莫起胡越意佳句類此甚多志特勤苦仕至洋州刺史有集一卷今傳鄭嵎字賓光大中五年李郜榜進士有集一卷名津陽門詩津陽即華清宫之外闕詢求父老為詩百韻皆紀明皇時事者也劉駕按書錄解題駕字司南與曹鄴為友深相結鄴既擢第不忍先歸待長安中駕成名按書錄解題駕大中六年進士迺同歸彭蠡故山時國家復河湟故地有歸馬放牛之象駕獻樂府十章上深悅累歴達官李頻按新唐書頻字徳新睦州夀昌人大中八年擢進士第工詩與同里方干為師友給事中姚合時稱詩穎頻不憚走千里丐其品第合見大加奬挹且愛其標格即以女妻之按此傳有闕文李羣玉字文山澧州人也清才曠逸不樂仕進專以吟詠自適詩筆遒麗文體丰美好吹笙美翰墨如王謝子弟別有一種風流親友强之赴舉一上即止裴相公休觀察湖南厚禮延致之郡中嘗勉之曰處士被褐懐玉浮雲富貴名高而身不知神寳寧久棄荒途子其行矣大中八年以草澤臣來京詣闕上表自進詩三百篇休適入相復論薦上悅之勅授𢎞文館校書郎李頻使君呼為從兄歸湘中題詩二妃廟是暮宿山舍夢見二女子來曰兒娥皇女英也承君佳句徽珮將遊於汗漫願相從也俄而影滅羣玉自是鬱鬱歲餘而卒段成式為詩哭曰曾話黄陵事今為白日催老無男女累誰哭到泉臺今有詩三卷後集五巻行世論曰夫澧浦古騷人之國屈原仕遭譖毁不知所訴心煩意亂賦為離騷蓋言離愁也國人莫知我兮又何懷乎故都委身魚腹魂招不來芳草遽萎蕭艾參天奚獨一時而然也羣玉繼禀修能翺翔大化人不知而不愠祿不及而不言望涔陽之亡極挹桂蘭之緒馨欵君門以披懐霑一命而潛退風景滿目寧無愧於古人故其格調清越而多登山臨水懐人送歸之製如逺客坐長夜雨聲孤寺秋請量東海水看取淺深愁等句已曲盡羇旅坎壈之情壯心千里於方寸不擾焉亦云難矣李郢字楚望大中十年崔鉶榜進士及第初居餘杭出有山水之興入有琴書之娯疏於馳競歴為藩鎭從事後拜侍御史郢工詩理密辭嫻箇箇珠玉其清麗極能寫景狀懐毎使人竟日不能釋卷與清塞賈島最相善時塞還俗島亦尋卒郢重來錢塘俱絶音響感而賦詩曰却到城中事事傷惠休歸俗賈生亡誰人收得文章篋獨我重經苔蘚房一命未霑為逐客萬緣初盡別空王蕭蕭竹塢殘陽在葉覆閒階雪擁牆其他警策率類此有集一卷今傳儲嗣宗大中十三年孔緯榜及第與顧非熊先生相結好大得詩名苦思夢索所謂逐句留心每字著意悠然塵外之想覽其所作及見其人警聨如綠毛辭世女白髪入壺翁又片水明在野萬花深見人又黄鶴有歸語白雲無忌心又蟬鳴月中樹風落客前花又池亭千里月煙水一封書又鶴語松上月花明雲裏春又一酌水邊酒數聲花下琴又宿草風悲夜荒村月弔人哭彭先生云空堦鶴戀丹青影秋雨苔封白石牀題閒居云鳥啼碧樹閒臨水花滿青山靜掩門等句皆區區所當避舍者也有集一卷今傳曹唐字堯賓桂州人初為道士工文賦詩大中間舉進士咸通中為使府從事唐與羅隱同時才情不異唐始起清流志趣澹然有淩雲之骨追慕古仙子高情往往奇遇而已才思不減前人遂作大遊仙詩五十篇又小遊仙詩等記其悲歡離合之要大播於時唐嘗會隱各論近作隱曰聞兄遊仙之製甚佳但中一聨云洞裏有天春寂寂人間無路月茫茫乃是鬼耳唐笑曰足下牡丹詩一聨乃詠女子陣若教解語應傾國任是無情也動人於是座客大笑唐平生志甚激昂至是薄宦頗自鬱悒為病馬詩以自况警聨如尾盤夜雨紅絲脆頭捽秋風白練低又云風吹病骨無驕氣土蝕騘花見臥痕又云飲驚白露泉花冷喫怕清秋豆葉寒皆膾炙人口忽一日晝夢仙女鸞佩花冠衣如煙霧倚樹吟咏唐天台劉阮詩若欲相招而出者唐驚覺頗怪之明日暴病卒亦感憶之所致也有詩集二卷今傳於世論曰人云有徳者或無文有文者或無徳文徳兼備古今所難典論謂文人相輕從古而然各以所長相輕所短矛楯之極則是非鋒起隙始於毫末禍大於丘山前後類此多矣夫以口舌常談無益無損每至喪清徳負良友承輕薄子之名乏藏疾匿瑕之量如此功業未見其超者矣君子所愼也鄭巢錢塘人大中間舉進士時姚合號詩宗為杭州刺史巢獻所業日遊門館累陪登覽燕集大得奬重如門生禮效合體格服膺無斁句意清新巢性疎野兩浙湖山寺宇幽勝多名僧外學高妙相與往還酬酢竟亦不仕而終有詩一卷今行於世于武陵大中時舉進士不稱意攜書與琴往來商洛巴蜀間或隱於卜中存獨醒之意避地嘿嘿語不及榮貴少與時輩交遊嘗南來至瀟湘愛汀洲芳草况是古騷人舊國風景不殊欲卜居未果歸老嵩陽高駢按新唐書駢字千里為西川節度築成都城四十里朝廷疑之以宴間詠風箏詩云依稀似曲纔堪聽又被風吹別調中明日詔下移鎭渚宫亦䜟之類也駢封渤海郡王棄人間事絶女色屬意神仙鄱陽商儈吕用之妄言能以妖術役鬼神及狂人諸葛殷張守一之徒凡十餘輩相引而進多為謬悠長年飛化之說羽衣鶴氅詭辯風生駢事之若神焉駢手握王爵口含天憲國家倚之名書於唐史叛臣傳亦何足道矣有詩一卷今傳大順中謝蟠隱為之序按駢傳全文已佚今就永樂大典所載五條編錄李昌符字巖夢咸通四年禮部侍郎蕭倣下進士工詩在長安與鄭谷酬贈仕終膳部員外郎嘗作奴婢詩五十首有云不論秋菊與春花箇箇能噇空肚茶無事莫教頻入庫每般閒物要些些等句後為御史劾奏以為輕薄為文多妨政務虧嚴重之徳唱俳戲之風謫去匏繫終身有集一卷行於世汪遵宣州涇縣人幼為小吏晝夜讀書良苦人皆不覺咸通七年韓衮榜進士遵初與鄉人許棠友善工為絶句詩而深自晦密以家貧難得書必借於人徹夜強記棠實不知一旦辭役就貢棠時先在京師偶送客至灞滻間忽遇遵於途行李索然棠訊之曰汪都何事來都者吏之呼也遵曰此來就貢棠怒曰小吏不忖而欲與棠同研席乎甚侮慢之後遵成名五年棠始及第洛中有李相徳裕平泉莊佳景殊勝李未幾坐事貶朱崖遵過題詩云平泉風景好高眠水色嵐光滿目前剛欲平他不平事至今惆悵滿南邊又過楊相宅詩云倚伏從來事不遥無何平地起青霄纔到青霄却平地門對古槐空寂寥俱為時人稱賞其餘警策稱是有集今傳論曰汪遵涇之一走耳拔身卑汚奪譽文苑家貧借書以夜繼日古人閱市偷光殆不過此昔溝中之斷今席上之珍丈夫自修當如是耶與夫朱門富家積書萬卷束在高閣塵暗籖軸蠧落帙帷網好學之名欺盲聾之俗非三變之敗無一展之期諺曰金玉有餘賣鎭宅書嗚呼哀哉翁綬咸通六年中書舍人李蔚下進士工詩多近體變古樂府音韻雖響風骨憔悴眞晚唐之移習也後亦間關名不甚顯固知閭巷之人欲砥行立名者非附青雲之士惡能施於後世哉有詩今傳沈光吳興人咸通七年禮部侍郎趙騭下進士工文章古詩標致翹楚大得美稱嘗作洞庭張樂賦韋岫見之曰此乃一片宫商也又如太白酒樓記等文皆儀表於世有詩集及雲夢子五卷並傳光風鑒澄爽神情俊邁後仕終御史云邵謁韶州翁源縣人少為縣㕔吏客至倉卒令怒其不榰床迎待逐去遂截髻著縣門上發憤讀書書堂距縣十餘里隱起水心謁平居如里中兒未冠者髪鬅鬙野服苦吟工古調咸通七年抵京師𨽻國子監時温庭筠主試憫擢寒苦乃榜謁詩三十餘篇以振公道曰前件進士識略精微堪裨教化聲詞激切曲備風謡標題命篇時所難及燈燭之下雄辭卓然誠宜榜示衆人不敢獨專華藻仍請申堂并榜禮部已而釋褐後赴官不知所終他日縣民祠神者持幘舞鈴忽自稱邵先輩降鄉里前輩皆至作禮問曰今者辱來能强為我賦詩乎巫即書一絶云青山山下少年郎失意當時別故鄉惆悵不堪回首望隔溪遥見舊書堂詞詠淒苦雖椽筆不逮鄉老中曉聲病者至為感泣咨嗟今有詩一巻傳於世司空圖字表聖河中人父輿大中時為商州刺史圖咸通十年歸仁紹榜進士主司王凝初典絳州圖時方應舉自別墅到郡上謁去閽吏遽申司空秀才出郭門外入郭訪親知即不造郡齋公謂其尊敬愈重之及知貢舉圖第四人捷同年鄙薄者謗曰此司空圖得一名也公頗聞因宴全榜宣言曰凝叨忝文柄今年榜帖專為司空先輩一人而已由是名益振未幾凝為宣歙觀察使辟置幕府召拜殿中侍御史不忍去凝府臺劾左遷光祿寺主簿盧相攜還朝過陜虢訪圖深愛重留詩曰氏族司空貴官班御史雄老夫如且在未可歎途窮景福中拜諫議大夫不赴昭宗在華州召為兵部侍郎以足疾自乞聽還圖家本中條山王官谷有先人田廬遂隱不出作亭觀素室悉圖唐興節士文人像嘗曰某宦情蕭索百事無能量才一宜休揣分二宜休耄而瞶三宜休遂名其亭曰三休作文以申志自號知非子耐辱居士言涉詭激不常欲免當時之禍初以風雨夜得古寳劒慘淡精靈常佩出入性苦吟舉筆緣興幾千萬篇自致於繩檢之外豫置冢棺遇勝日引客坐壙中賦詩酌酒霑醉高歌客有難者曰君何不廣耶生死一致吾寧暫遊此中哉歲時祠禱與閭里父老鼓舞相樂時寇盜所過虀粉獨不入谷中知圖賢如古王蠋也士民依以避難後聞哀帝遇弑不食扼腕嘔血數升而卒年七十有二有一鳴集三十卷行於世崔道融荆人也自號東甌散人與司空圖為詩友出為永嘉宰工絶句語意妙甚如銅雀妓云歌咽新翻曲香銷舊賜衣陵園風雨暗不見六龍歸春閨云寒食月明雨落花香滿泥佳人持錦字無雁寄遼西寄人云淡淡長江水悠悠逺客情落花相與恨到地一無聲寒食夜云滿地梨花白風吹碎月明大家寒食夜獨貯逺鄉情等尚衆誰謂晚唐間忽有此作使古人復生亦不多讓可謂出乎其類拔乎其萃者矣人悉推服其風情雅度猶恨出處未能梗槩之也有申唐集十卷自序云乾符乙卯夏寓永嘉山齋收拾草稿得五百餘篇今存於世聶夷中字坦之河南人也咸通十二年禮部侍郎高湜下進士與許棠公乘億同袍時兵革多務不暇銓注夷中滯長安久皂裘已敝黄糧如珠始得調華隂縣尉之官惟琴書而已性儉久沈草澤備嘗辛楚率多傷俗閔時之作哀稼穡之艱難適值險阻進退維谷才足而命屯有志卒爽含蓄諷刺亦有謂焉古樂府尤得體皆警省之辭裨補政治樂而不淫哀而不傷正國風之義也其詩一卷今傳許棠字文化宣州涇人也於詩文性僻少合既久困名場時馬戴佐大同軍幕為詞宗棠往謁之一見如舊交留連累月但從事詩酒而已未嘗問所欲一旦大會賓客命使以棠家書授之棠驚愕不喻其來啓緘即知戴潛遣一介恤其家矣古人温良泛愛振窮周急謙退不伐亦皆絶異之資也咸通十二年李筠榜進士及第時及知命嘗曰自得一第稍覺筋骨輕健愈於少年則知一名乃孤進之還丹也調涇縣尉之官鄭谷送詩曰白頭新作尉縣在故山中高第能卑宦前賢尚此風後潦倒辭榮初作洞庭詩膾炙時口號許洞庭云今集一卷傳世周繇按唐詩紀事繇字為憲江南人咸通十三年鄭昌圖榜進士調福昌縣尉家貧生理索寞只苦嗜篇韻俯有思仰有詠深造閫域時號為詩禪警聨如送人尉黔中云公庭飛白鳥官俸請丹砂望海云島間應有國波外恐無天甘露寺云殿鎖南朝像龕傳外國僧又山從平地有水到逺天無又白雲連菌閣碧樹盡蕪城江州上薛能尚書云樹翳樓臺月帆飛鼓角風又郡齋多嶽客鄉户半漁翁等句甚多讀之皆使人竦誠好手也落拓盃酒無榮辱之累所交遊悉一時名公集今傳世同登第有張演者工詩間見一二篇亦佳作也論曰嘗謂禪家者流論有大小乗有邪正法要能具正法眼方為第一義出有無間若聲聞辟支四果已非正也况又墮野狐外道鬼窟中乎言詩亦然宗派或殊風義必合品則有神妙體則有古今才則有聖凡時則有取舍自晉魏以降遞至盛唐大歴元和以下逮晚年考其時變商其格製其邪正了然在目不能隱也經云過而不改是謂過矣悟門洞開慧燭深照頓漸之境各天所賦觀於時以詩禪許周繇為其不入邪見直臻上乗固知其衣冠於裸人之國矣昔人謂學詩如學仙此之類歟皮日休按唐詩紀事日休字襲美襄陽人隱居鹿門山性嗜酒癖詩號醉吟先生又號間氣布衣言己天地之間氣也以文章自負尤喜箴銘咸通八年禮部侍郎鄭愚下及第為著作郎遷太常博士時值末年虎狼放縱百姓手足無所措上下所行皆大亂之道遂作鹿門隱詩六十篇多譏切謬政有云毁人者自毁之譽人者自譽之又曰不思而立言不知而定交吾其憚也在鄉里與陸龜䝉交若金蘭日相贈和性沖泊無營臨難不懼乾符喪亂東出關陷巢賊中巢惜其才授以翰林學士日休惶恐跼踧欲死未能刼令作䜟文以惑衆曰欲知聖人姓田八二十一欲知聖人名果頭三屈律賊疑其衷恨必譏己遂殺之臨刑神色自若知與不知皆痛惋也日休自集所為文十卷名文藪及詩集一卷滑臺集七卷又著皮氏鹿門家鈔九十卷並傳鄭谷按新唐書藝文志注谷字守愚袁州人而唐詩紀事則云谷字若愚谷父史開成中為永州刺史谷幼穎悟絶倫七歲能詠司空侍郎圖與史同院見而竒之問曰予詩有病否曰大夫曲江晚望云村南斜日閒回首一對鴛鴦浴渡頭此意深矣司空拊谷背曰當為一代風騷主也光啓三年右丞栁玭下第進士授京兆鄠縣尉遷右拾遺補闕乾寧四年為都官郎中詩家稱鄭都官又嘗賦鷓鴣警絶復稱鄭鷓鴣云未幾告歸退隱仰山書堂卒於北巖別墅谷詩清婉明白不俚而切為薛能李頻所賞與許棠任濤張蠙李栖逺張喬喻坦之周繇温憲李昌符唱答往還號芳林十哲谷多結契山僧曰蜀茶似僧未必皆美不能舍之齊已攜詩卷來袁謁谷早梅云前村深雪裏昨夜數枝開谷曰數枝非早也未若一枝佳已不覺設拜曰我一字師也嘗從僖宗登三峰朝謁之暇寓於雲臺道舍編所作為雲臺編三卷歸編宜陽集三卷及撰國風正訣一卷分六門摭詩聨注其比象君臣賢否國家治亂之意今並傳焉張喬池州人也隱居九華山有高致十年不窺園以苦學詩句清雅迥少其倫當時東南多才子如許棠喻坦之劇燕吳宰任濤周繇張蠙鄭谷李栖逺李昌符與喬亦稱十哲俱以韻律馳聲大順中京兆府解試李參軍頻時主文試以月中桂詩喬云根非生下土葉不墜秋風遂擅場其年頻以許棠久困場屋以為首薦喬與喻坦之復受放薛尚書知之欲表於朝以他不果竟岨峿名途徒得一進耳有詩集二卷傳世胡曾長沙人也咸通中進士初再三下第有詩云翰苑幾時休嫁女文昌早晚罷生兒上林新桂年年發不許時人折一枝曾天分高爽意度不凡視人間富貴亦悠悠遊歴四方馬跡窮歲月所在必公卿館榖上交不諂下交不瀆竒士也嘗為漢南節度從事作詠史詩皆題古君臣爭戰興廢塵跡經覽形勝關山亭障江海深阻一一可賞人事雖非風景猶昨每感輒賦俱能使人奮飛至今庸夫孺子亦知傳誦後有擬效者不逮矣至於近體律絶等哀怨清楚曲盡幽情擢居中品不過也惜其才茂而身未穎脫痛哉今詠史詩一卷有咸通中人陳蓋註及安定集十卷行世來鵬豫章人家徐孺子亭邊林園自樂師韓栁為文大中咸通間才名藉甚凡十上不得第鵬工詩蓄銳既久自傷年長家貧不達頗亦忿忿故多寓意譏訕當路雖賞清麗不免忤情每為所忌如金錢花云青帝若教花裏用牡丹應是得錢人韋岫尚書獨賞其才延待幕中攜以遊蜀又欲納為壻不果是年力薦夏課獻詩有云一夜綠荷風翦破嫌他秋雨不成珠岫以為不祥果失志時遭亂避地客死於維揚逆旅主人賢而葬之李山甫咸通中累舉進士不第落魄有不羈才鬚髯如㦸能為青白眼生平憎俗子尚豪俠雖簞食豆羮自甘不厭為詩託諷不得志每狂歌痛飲援劒斫地少攄鬱鬱之氣耳後流寓河朔間依樂彦楨為魏博從事不得衆情以陵傲之故無所遇嘗有老將詩曰校獵燕山經幾春雕弓白羽不離身年來馬上渾無力望見飛鴻指似人此傷其蹇薄無成時人憐之後不知所終山甫詩文激切耿耿有齊氣多感時懐古之作今集一卷賦二卷並傳趙光逺丞相隱之猶子也幼而聰悟咸通乾符中稱氣焰善為詩温庭筠李商隱輩梯媒之恃才不拘小節皆金鞍駿馬嘗將子弟恣遊狹斜著北里志頗述青樓紅粉之事及有詩等傳於世論曰光逺等千金之子厭飫膏粱仰䕃承榮視若談笑驕侈不期而至矣况年少多材京邑繁盛耳目所蕩素少閑邪之慮者哉故辭意多裙裾妖艷之態無足怪矣有孫啓崔珏同時恣心狂狎善為唱和頗陷輕薄無退讓之風惟盧弼氣象稍嚴不遷狐惑如邊庭四時怨等作賞音大播信不偶然區區涼德徒曰貴介不暇錄尚多云趙牧不知何許人大中咸通中累舉進士不第有俊材負竒節遂舍場屋放浪人間效李長吉為歌詩頗涉狂怪聳動當時蹙金結繡而無痕迹裝染其餘輕巧之詞甚多同時有劉光逺亦慕長吉凡作體效尤能埋沒意緒竟不知所終俱有詩傳世牛嶠字延峰隴西人宰相僧孺之後博學有文以歌詩著名乾符五年孫偓榜第四人進士仕歴拾遺補闕尚書郎王建鎭四川辟為判官及偽蜀開國拜給事中有集本三十卷自序云竊慕李長吉所為歌詩輒效之今傳於世唐才子傳巻六
