body:
  text: 唐才子傳卷七元辛文房撰高蟾任濤羅隱羅鄴羅虬唐彥謙崔魯秦韜玉李洞崔塗鄭良士唐備于濆吳融韓渥王駕戴司顔王焕張鼎盧延讓曹松裴説韋莊張蠙王貞白王轂殷文圭褚載翁承贊李中李建勳孫魴沈彬子廷瑞江為廖圖劉昭禹等鄭凖熊皎孟賓于孟貫高蟾河朔間人乾符三年孔緘榜及第與鄭郎中谷為友酬贈稱高先輩初纍舉不上題省墻間曰氷柱數條榰白日天門幾扇鎖明時陽春發處無根蒂慿仗東風次第吹怨而切是年人論不公又下第上馬侍郎云天上碧桃和露種日邊紅杏倚雲栽芙蓉生在秋江上莫向春風怨未開意亦悽楚馬憐之又有顔色如花命如葉之句自况時運蹇窒馬因力薦明年李昭知貢舉遂擢桂官至御史中丞蟾本寒士皇皇於一名十年始就性倜儻離羣稍尚氣節人與千金無故即身死亦不受其胸次磊塊詩酒能為消破耳詩體則氣勢雄偉態度諧逺如狂風猛雨之來物物竦動深造理窟亦一竒逢掖也詩集一卷今傳任濤筠川人也章句之名早擅乾符中應數舉每敗於埀成李常侍隲亷察江西素聞濤名取其詩覽之有云露漙沙鶴起人卧釣船流大加賞歎曰任濤竒才也何故不成名會當薦之特與放鄉里雜役仍令本貫優禮時盲俗互有論列隲判曰江西境內凡為詩得及濤者即與放役豈止一任濤而已哉未幾濤逝去有才無命大可憐也詩集今傳羅隱字昭諫錢塘人也少英敏善屬文詩筆尤俊拔養浩然之氣乾符初舉進士纍不第廣明中遇亂歸鄉里時錢尚父鎮東南節鉞崇重隱欲依焉進謁投素作卷其首章過夏口云一箇禰衡容不得思量黃祖漫英雄鏐得之大喜以書辟之曰仲宣逺託劉荆州蓋因亂世夫子樂為魯司冦祗為故鄉隱曰是不可去矣遂為掌書記性簡傲闊談高論滿座風生好諧謔感遇輒發鏐愛其才前後賜豫無數陪從不頃刻相背表遷節度判官鹽鐵發運使未幾奏授著作郎鏐初授鎮命沈嵩草表謝盛言浙西富庶隱曰今浙西焚蕩之餘朝臣方切賄賂表奏將鷹犬我矣鏐請隱更之有云天寒而麋鹿曽遊日暮而牛羊不下又為賀昭宗改名表云左則姬昌之半字右為虞舜之全文作者稱賞轉司勳郎中自號江東生魏博節度羅紹威慕其名推宗人之分拜為叔父時亦老矣嘗表薦之隱恃才忽睨衆頗憎忌自以當得大用而一第落落傳食諸侯因人成事深怨唐室詩文多以譏刺為主雖荒祠木偶莫能免者且介僻寡合不喜軍旅獻酬俎豆間綽綽有餘也隱初貧來赴舉過鍾陵見營妓雲英有才思後一紀下第過之英曰羅秀才尚未脫白隱贈詩云鍾陵醉别十餘春重見雲英掌上身我未成名英未嫁可能俱是不如人與顧雲同謁淮南高駢駢不禮駢後為畢將軍所殺隱有延和閣之譏又以詩投相國鄭畋畋有女姝麗喜詩詠讀隱作至張華漫出如丹語不及劉侯一紙書由是切慕之精爽飛越莫知所從隱忽來謁女從簾後窺見迂寢之狀不復念矣隱精法書喜筆工萇鳯謂曰筆文章貨也今助子取高價即以鴈頭箋百幅為贈士大夫踵門問價一致千金率多借重如此所著讒書讒本淮海寓言湘南應用集甲乙集外集啓事等並行于世論曰易戒毋以小善為無益而弗為小惡為無傷而弗去也羅隱以褊急性成動必嘲訕率成漫作頃刻相傳以其事業非不五鼎也學術非不經史也夫何齊東野人猥巷小子語及譏誚必以隱為稱首凋喪淳才揄揚穢德白日能蔽于浮翳美玉曽玷于青蠅雖亦未必盡然是皆闕慎微之義阮嗣宗臧否不挂口欲免其身如滑稽抗世東方朔之流又不相類也羅鄴餘杭人也家資巨萬父則為鹽鐵吏子二人俱以文學干進鄴尤長律詩時宗人隱虬俱以聲格著稱遂齊名號三羅隱雄麗而坦率鄴清緻而聫綿虬則區區而巳咸通中數下第有詩云故鄉依舊空歸去帝里如同不到來崔安潛侍郎亷問江西鄴適飄蓬湘浦間崔素賞其作志在弓旌竟為幕吏所沮既而俯就督郵不得志踉蹌北征赴職單于牙帳鄴去家愈逺萬里沙漠滿目誰親因兹觸緒闌珊無成於邑而卒論曰鄴素有英資筆端超絶其氣宇亦不在諸人下初無箕裘之訓頓改門風崛興音韻馳譽當時非易事也而跋前疐後絶域無聊獨奈其命薄何孔子曰才難信然有詩集一卷今傳羅虬詞藻富贍與族人隱鄴齊名咸通間稱三羅氣宇終不逮廣明庚子亂後去從鄜州李孝恭為從事虬狂蕩無檢束時雕隂籍中有妓杜紅兒善歌舞姿色殊絶嘗為副戎屬意會副戎聘鄰道虬久慕之至是請紅兒歌贈以繒綵孝恭以為副戎所盼為從事歌則非禮勿令受貺虬不稱意怒拂衣起詰旦手刃殺之孝恭以虬激已坐之頃會赦虬追其寃于是取古之美女有姿艷才德者作絶句一百首以比紅兒當時盛傳此外不見有他作體固凡庸無大可采序曰紅兒美貌年少機智慧悟不與羣妓等余知紅者擇古灼然美色優劣于章句間其卒章云花落塵中玉墮泥香魂應上窈娘堤欲知此恨無窮處長倩城烏夜夜啼情極哀切初以白刃相加今曰余知紅者虬實一狂夫也且聲律之道大爽姑録為笑談耳唐彥謙按新舊唐書彥謙字茂業才高負氣毫髮逆意大怒叵禁博學足藝尤長於詩道古心雄發言不茍極能用事如自已出初師溫庭筠風調逼似故多纎麗之詞後變淳雅尊崇工部唐人效甫者惟彥謙一人而已按此傳有闕文崔魯廣明間舉進士工為雜文才麗而蕩詩慕杜紫微風範警句絶多如梅花云強半瘦因前夜雪數枝愁向晚來天又初開已入雕梁畫未落先愁玉笛吹蓮花云何人解把無塵袖盛取清香盡日憐山鵲云一畨春雨吹巢冷半朵山花咽觜香又别題云雲生柱礎降龍地露洗林巒放鶴天等皆綺製精深膾炙人口頗嗜酒無德嘗醉辱陸肱郎中旦日慚甚為詩謝曰醉時顛蹶醒時羞麴蘖催人不自由叵耐一雙窮相眼不堪花卉在前頭陸亦諒之悠悠亂世竟無所成魯詩善於狀景詠物讀之如咽氷雪心爽神怡能逺聲病氣象清楚格調且高中間别有一種風情佳作也詩三百餘篇名無機集今傳秦韜玉按新唐書藝文志注云韜玉字中明唐詩紀事云京兆人書録解題云韜玉田令孜客僖宗中和二年特賜及第賦湘江詩云女媧羅裙長百尺搭在湘江作山色又云嵐光楚岫和空碧秋染湘江到底清由是知名號為絶唱按此傳有闕文李洞字才江雍州人諸王之孫也家貧吟極苦至廢寢食酷慕賈長江遂銅寫島像戴之巾中常持數珠念賈島佛一日千遍人有喜島詩者洞必手録島詩贈之丁寧再四曰此無異佛經歸焚香拜之其仰慕一何如是之切也然洞詩逼真似島新竒或過之時人多誚其僻澀不貴其卓峭唯吳融賞異融以大才八靣受敵新律著稱遊刃頗攻騷雅嘗以百篇示洞洞曰大兄所示中一聫暖漾魚遺子晴遊鹿引麛絶妙也融不怨所鄙而善其所許洞詩大略如終南山云殘陽高照蜀敗葉逺浮涇斸竹煙嵐凍偷湫雨雹腥逺平丹鳯闕冷射五侯廳贈司空圖云馬飢餐落葉鶴病曬殘陽又曰卷箔清溪月敲松紫閣書送僧云越講迎騎象蕃齋懴射雕送僧遊南海云島嶼分諸國星河共一天夜云藥杵聲中搗殘夢茶鐺影裏煮孤燈皆偉拔時流者昭宗時凡三上不第裴公第二榜簾前獻詩云公道此時如不得昭陵慟哭一生休果失意流落往來寓蜀而卒初島任長江乃東蜀塜在其處鄭谷哭洞詩云得近長江死想君勝在生言死生不相逺也洞嘗集島警句五十聫及唐諸人警句五十聨為詩句圖自為之序及所為詩一卷並傳崔塗字禮山光啓四年鄭貽矩榜進士及第工詩深造理窟端能竦動人意寫景狀懷往往宣陶肺腑亦窮年羇旅壯嵗上巴蜀老大遊隴山家寄江南每多離怨之作警策如流年川暗度往事月空明巫娥云江山非舊主雲雨是前身又如病知新事少老别故交難孤鴈云渚雲低暗度關月冷相隨山寺云夕陽高鳥過踈雨一鐘殘又谷樹雲埋老僧窗瀑照寒鸚鵡洲云曹瞞尚不能容物黃祖何因解愛才春夕云胡蝶夢中家萬里杜鵑枝上月三更隴上云三聲戍角邊城暮萬里鄉心塞草春過峽云五千里外三年客十二峰前一望秋等聫作者於此斂袵意味俱逺大名不虛有詩一卷今行於世鄭良士字君夢咸通中纍舉進士不第昭宗時自表獻詩五百餘篇敕授補闕而終以布衣一旦俯拾青紫易若反掌浮俗莫不駭羡難其比也今有白巖集十卷傳世論曰舊言詩或窮人或逹人逹者良士是矣亦命之所為詩何能與過詩則不揣其本也唐備龍紀元年進士工古詩多涵諷刺頗干教化非浮艷輕斐之作與同時于濆者按新唐書藝文志注濆字子漪書録解題濆咸通二年進士共一機軸大為時流所許備詩有天若無雪霜青松不如草地若無山川何人重平道又狂風拔倒樹樹倒根已露上有數枝藤青青猶未悟又一日天無風四溟波自息人心風不吹波浪高百尺又别家云兄弟惜分離揀日皆言惡豫讀對花云花開蝶滿枝花謝蝶來稀惟有舊巢燕主人貧亦歸等詩發語澆俗至今人話間必舉以為警戒足見之矣餘詩多傳吳融按新唐書云融字子華越州山隂人龍紀初及進士第天復元年元旦東內反正既御樓融最先至上命於前座草數十詔簡備精當曽不頃刻皆中旨大加激賞進户部侍郎按融傳祗存此數語餘並闕韓偓京兆人按新唐書偓字致光京兆萬年人龍紀元年禮部侍郎趙宗榜擢第天復中王溥薦為翰林學士遷中書舍人從昭宗幸鳯翔進兵部侍郎翰林承旨嘗與崔胤定䇿誅劉季述昭宗反正論為功臣帝勵精政事偓處可機密率與上意合欲相者三四讓不敢當偓喜侵侮有位朱全忠亦惡之乃搆禍貶濮州司馬帝流涕曰我左右無人矣天祐二年復召為學士偓不敢入朝挈其族南依王審知而卒偓自號玉山樵人工詩有集一卷詞多側艷新巧又作金鑾密記五卷今並傳王駕字大用蒲中人自號守素先生大順元年楊贊禹榜登第授校書郎仕至禮部員外郎棄官嘉遁於别業與鄭谷司空圖為詩友才名籍甚圖嘗與駕書評詩曰國初雅風特盛沈宋始興之後傑出於江寧宏思於李杜極矣右丞蘇州趣味澄敻若清流之貫逺大歷十數公抑又其次元白力勍而氣孱乃都市豪估耳劉夢得楊巨源亦各有勝會浪仙無可劉得仁輩時得佳致亦足滌煩厥後所聞徒褊淺矣河汾蟠鬱之氣宜繼起有人今王生寓居其間沉漬益久五言所得長於思與境偕乃詩家之所尚者則前所謂必推於其類豈止神躍色揚而已哉駕得書自謂譽已不虛矣當時價重乃如此也今集六卷行於世戴司顔大順元年楊贊禹榜進士及第與王駕同袍有詩名氣宇盤礴每有過人遂得名家豈泛然矣有集今傳王焕按唐詩紀事焕字羣吉大順二年禮部侍郎裴贄下進士及第俄自左史拜考功員外郎同年皆美除焕首倡感恩長句上謝座主裴公當時甚榮之後以禮部侍郎致仕年九十見睢陽五老圖焕工詩情極婉麗嘗為惆悵詩十三首悉古佳人才子深懷感怨者以崔氏鶯鶯漢武李夫人陳樂昌主緑珠張麗華王明君及蘇武劉阮輩事成篇哀傷媚嫵如謝家池館花籠月蕭寺房廊竹颭風夜半酒醒慿檻立所思多在别離中又夢裡分明入漢宫覺來燈背錦屏空紫臺月落關山曉腸斷君王信畫工等皆絶唱喧炙士林在晚唐諸人中霄壤不侔矣有集今傳張鼎字台業閩中人景福二年崔膠榜進士工詩離羣拔類集一卷及著唐詩主客圖等並傳於世盧延讓字子善范陽人也有卓絶之才光化三年裴格榜進士朗陵雷滿薦辟之滿敗歸偽蜀授水部員外郎纍遷給事中卒官刑部侍郎延讓師許下薛尚書為詩詞意入僻不競纎巧且多健語下士大笑之初吳融為侍御史出官峽中時延讓布衣薄遊荆渚貧無卷軸未遑贄謁會融弟得延讓詩百餘篇融覽其警聫如宿東林云兩三條電欲為雨七八箇星猶在天旅舍言懷云名紙毛生五門下家童骨立六街中贈元上人云高僧解語牙無水老鶴能飛骨有風蜀道云雲間閙鐸騾馱去雪裏殘骸虎拽來又云樹上諏咨批頰鳥窗間逼駮扣頭蟲等句大驚曰此去人逺絶自無蹈襲非尋常耳此子後必垂名余昔在翰林召對上曽舉其臂鷹健卒橫氊帽騎馬佳人卷畫衫一聨雖淺近然自成一體名家今則信然矣按此條全本楊大年談苑考談苑原文云盧延遜詩淺近人皆笑之惟吳融獨重之且云後必垂名延遜詩亦有佳處如宿東林云云余在翰林嘗召對上舉延遜臂鷹騎馬二句雖淺近亦自成一體也考宋避濮安懿王名故諱讓字延遜即延讓也但翰林召對數語乃大年自述其知制誥時事原文以為吳融之言舛謬殊甚謹訂於此遂厚禮遇贈給甚多融雪中寄詩云永日應無食終宵必有詩後奪科第多融之力也今詩一卷傳世曹松字夢徴舒州人也學賈島為詩深入幽境然無枯淡之癖尤長啓事不減山公早嵗未逹常避亂來棲洪都西山初在建州依李頻頻卒後往來一無所遇光化四年禮部侍郎杜德祥下與王希羽劉象柯崇鄭希顔同登第年皆七十餘矣號為五老榜時值新平內難朝廷以放進士為喜特授校書郎而卒松野性方直罕接俗事故拙於進宦逍遙林澤寓情虛無苦極於詩然别有一種風味不淪乎怪也文集三卷今傳裴説工詩足竒思非意表琢煉不舉筆有島洞之風大得盛名初年窘迫亂離奔走道路有詩云避亂一身多見者悲之有集今傳韋莊按書録解題莊乾寧元年進士少孤貧力學才敏過人莊應舉時正黃巢犯闕兵火交作遂著秦婦吟有云內庫燒為錦繡灰天街踏盡却重回亂定公卿多訝之號為秦婦吟秀才莊自來成都尋得杜少陵所居浣花溪故址雖蕪沒已久而柱砥猶存遂誅茅重作草堂而居焉性儉約稱薪而爨數米而炊逹人鄙之早嘗冦亂間關頓躓攜家來越中弟妹散居諸郡西江湖南所在薄遊舉目有山河之異故於流離漂泛寓目緣情子期懷舊之辭王粲傷時之製或離羣軫慮或反袂興悲四愁九怨之文一詠一觴之作俱能感動人也按此傳有闕文張蠙按新唐書藝文志注蠙字象文家貧纍下第留滯長安賦詩云月裏路從何處上江邊身合幾時歸十年九陌寒風夜夢掃蘆花絮客衣及第釋褐後為金堂令按書録解題蠙乾寧二年進士王衍與徐后遊大慈寺見壁間題墻頭細雨垂纎草水靣回風聚落花愛賞久之問誰作左右以蠙對因給箋令以詩進蠙上二百篇衍尤重待賜白金千兩王貞白字有道信州永豐人也乾寧二年登第後物議紛紛詔翰林學士陸扆於內殿覆試中選授校書郎時登第後七年矣鄭谷以詩贈曰殿前新進士闕下校書郎初蘭溪僧貫休雅得名與貞白所居相去不逺而未會嘗寄御溝詩有云此波涵帝澤無處濯塵纓後會語及此休曰剩一字貞白拂袂而去休曰此公思敏當即來休書字於掌心逡巡貞白還曰此中涵帝澤如何休以掌示之無異所改遂訂深契後值天王狩于岐乃退居著書不復干祿當時大獲芳譽性恬和明易象手編所為詩三百篇及賦文等為靈溪集七卷傳於世卒葬家山貞白學力精贍篤志於詩清潤典雅呼吸間兩獲科甲自致於青雲之上文價可知矣深惟存亡取舍之義進而就祿退而保身君子也梁陶𢎞景棄官隱居三茅國事必咨請稱山中宰相號貞白今王公蓋慕其為人而云爾王轂字虛中宜春人自號臨沂子以歌詩擅名長於樂府未第時嘗為玉樹曲云璧月夜瓊樹春鶯舌泠泠詞調新當時狎客盡持祿直諫犯顔無一人歌未闋晉王劍上粘腥血君臣猶在醉鄉中一靣已無陳日月大播人口適有同人為無賴輩所毆轂前救之曰莫無禮我便是道君臣猶在醉鄉中者無賴聞之慚謝而退轂亦大節士輕財重義為鄉里所譽頗不平久困適生離難間辭多寄寓比興之作無不知名乾寧五年羊紹素榜進士歷國子博士後以郎官致仕有詩三卷于時宦逹俱素餐尸位賣降恐後之徒轂因撰前代忠臣臨老不變者為圖一卷及觀光集一卷並傳殷文圭字表儒池州青陽人也乾寧五年禮部侍郎裴贄下進士初未第時道中嘗逢一老叟目文圭久之謂人曰向者布衣緑眉方口神仙中人也如學道可以沖虛不爾垂大名於天下未幾兵馬振動大駕幸三峯文圭以梁王表薦及第時楊令公行密鎮淮揚奄有宣浙揚汴之間榛梗既久文圭辭親間道至行在無何隨榜為吏部侍郎裴樞宣慰判官記室參軍至大梁以身事叩梁王王又上表薦之文圭後飾非遍投啓事公卿間曰於菟獵食非求尺璧之珍爰居避風不望洪鐘之樂俄為多言者所發後更道由宋汴亟馳過梁王大怒亟遣追捕已不及矣為詩有登龍集冥搜集筆耕詞氷鏤録從軍藳等集傳世論曰唐季文體澆漓才調荒穢稍稍作者強名曰詩南郭之竽茍存於衆響非復盛時之萬一也如王周劉兼司馬札蘇拯許琳李咸用等數人雖有集相傳皆氣卑格下負魚目唐突之慚竊碔砆韞襲之濫所謂家有敝帚享之千金不自見之患也文圭稍入風度間見竒崛其殆庶幾乎褚載字厚之家貧客梁宋間困甚以詩投襄陽節度使邢君牙云西風昨夜墜紅蘭一宿郵亭事萬般無地可耕歸不得有恩堪報死何難流年怕老看將老百計求安未得安一卷新詩滿懷淚頻來門館訴飢寒君牙憐之贈絹十匹薦於鄭滑節度使不行乾寧五年禮部侍郎裴贄知貢舉君牙又薦之遂擢第初文德中劉子長出鎮浙西行次江西時陸威侍郎猶為郎吏亦寓于此載緘二軸投謁誤以子長之卷靣贄於威威覽之連見數字觸家諱威矍然載錯愕曰似大誤尋謝以長箋略曰曹興之圖畫雖精終慙誤筆殷浩之兢持太過翻逹空函威激賞而終不能引拔後竟流落而卒集三卷今傳於世翁承贊按新唐書藝文志注云承贊字文堯乾寧進士唐詩紀事云閩人工詩體貌甚偉且詼諧名動公侯唐人應試每在八月諺曰槐花黃舉子忙承贊詠槐花云雨中粧點望中黃勾引蟬聲送夕陽憶得當年隨計吏馬蹄終日為君忙按此傳有闕文李中字有中九江人也唐末嘗第進士為新塗淦陽吉水三縣令仕終水部郎中孟賔于賞其工吟絶似方干賈島時復過之如暖風醫病草甘雨洗荒村又貧來賣書劍病起憶江湖又間花半落處幽鳥未來時又千里夢隨殘月斷一聲蟬送早秋來又殘陽影裏水東注芳草煙中人獨行又間尋野寺聽秋水寄睡僧窗到夕陽又香入肌膚花洞酒冷侵魂夢石床雲又西園雨過好花盡南陌人稀芳草深等句驚人泣鬼之語也有碧雲集今傳李建勳字致堯廣陵人仕南唐為宰相後罷出鎮臨川未幾以司徒致仕賜號鍾山公年已八十志尚散逸多從仙侣參究玄門時宋齊丘有道氣在洪州西山建勳造謁致敬欲授真果題詩贈云春來漲水波如活曉起西山勢似行玉洞有人經劫在攜竿步步就長生歸高安别墅一夕無病而逝能文賦詩琢鍊頗工調既平妥終少驚人之句也有鍾山集二十卷行於世孫魴按馬令南唐書魴字伯魚唐詩紀事魴南昌人唐末處士也與沈彬李建勳同時倡和亦多魴有夜坐詩為世稱玩建勳日與談宴嘗匿魴於齋幕中待沈彬來乃問曰魴夜坐詩如何彬曰田舍翁火爐頭之語何足道哉魴從幕中出誚彬曰何譏謗之甚彬曰畫多灰漸冷坐久席成痕此非田舍翁爐上誰有此况一座大笑及金山寺詩云天多剩得月地少不生塵當時謂騷情風韻不減張祜有詩五卷今傳沈彬字子文瑞州高安人自幼苦學屬末嵗離亂隨計不捷南遊湖湘隱雲陽山數年歸鄉里時南唐李忭鎮金陵旁羅俊逸名儒宿老必命郡縣起之彬赴辟知忭欲取楊氏因獻畫山水詩云須知手筆安排定不怕山河整頓難忭覽之大喜授祕書郎保大中以尚書郎致仕歸徙居宜春初經板蕩與韋莊杜光庭貫休俱避難在蜀多見酬酢彬臨終指葬處示家人及窆果掘得一空冢有漆燈青熒壙頭立一銅板篆文曰佳城今已開雖開不葬埋漆燈終未滅留待沈彬來遂窀穸於此有詩集一卷傳世彬第二子廷瑞性坦率豪於觴詠舉動異俗盛夏附火嚴冬單衣或遇崇山野水古洞幽壇竟日不返時人異之呼為沈道者士大夫多邀至門館一日邑宰戲問何日道成廷瑞即留詩曰何須問我道成時紫府清都自有期手掘藥苖人不識體涵仙骨俗爭知宰驚謝後浪遊四方或傳仙去也江為按書録解題為建安人舉進士輒不第工詩有天形圍澤國秋色露人家身寒花露重江晚水煙微等句膾炙人口少逰白鹿寺有句云吟登蕭寺旃檀閣醉倚王家玳瑁筵後主南遷見之曰此人大是富貴家按此傳有闕文廖圖字贊禹虔州虔化人文學博贍為時輩所服湖南馬氏辟致幕下奏授天策府學士與同時劉昭禹李𢎞臯徐仲雅蔡昆韋鼎釋虛中俱以文藻知名賡倡迭和齊巳時寓渚宫與圖相去千里而每詩筒往來不絶警䇿極多必見高致集二卷今行於世時有荆南從事鄭準亦工詩與僧尚顔多所酬贈詩亦傳熊皎九華山人唐清泰二年進士劉景巖節度延安辟為從事晉天福中説景巖歸朝以功擢右諫議竟坐纍黜為上津令工古律詩語意俱妙嘗賦早梅云一夜開欲盡百花猶未知甚傳賞士林且知其必遇今有屠龍集南金集合五卷傳世學士陶榖序之孟賔于按郡閣雅談賔于字國儀連州人晉天福九年禮部郎符蒙知貢賔于簾下投詩云那堪雨後更聞蟬溪隔重湖路七千憶得故園楊栁岸全家送上渡頭船蒙得詩以為相見之晚遂擢第時已敗六舉矣按此傳有闕文孟貫閩中人為性踈野不以榮宦為意喜篇章周世宗幸廣陵貫時大有詩價世宗亦聞之因繕録一卷獻上首篇書貽談先生云不伐有巢樹多移無主花世宗不恱曰朕伐叛弔民何得有有巢無主之説獻朕則可他人則卿必不免不復終卷賜釋褐進士虛名而巳不知其終有詩集今傳論曰孟子曰豫之不遇魯侯天也至唐開元孟浩然流落帝心和璧墮地孟郊之出處梗概苦艱薄宦而死今孟貫坐此詩窮轉喉觸諱非意相干竟爾埋沒與前賢俱亦相似命也孟氏之不遇一何多耶唐才子傳卷七
