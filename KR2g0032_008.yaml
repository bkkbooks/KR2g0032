body:
  text: 唐才子傳卷八元辛文房撰隱逸王績盧鴻張彪劉方平秦系張志和陸羽張衆甫趙微明等朱放盧同方干陸龜蒙周朴唐求仙吳筠顧況子非熊劉商韓湘施肩吾陳陶吕巖陳摶僧靈一皎然無可清塞虛中貫休齊己妓薛濤女道士李季蘭魚玄機王績按新唐書績字無功龍門人王文中子通之弟也年十五遊長安謁楊素一座服其英敏目為神仙童子舉孝亷授六合縣丞以嗜酒妨政遂託病風輕舟夜遁歎曰網羅在天吾將安之乃還鄉里武德中詔以前官待詔門下省弟靜謂績曰待詔可樂否曰待詔俸薄況蕭索但良醖三升差可戀耳江國公聞之曰三升良醖未足以絆王先生特判日給一斗時人呼為斗酒學士貞觀初以疾罷歸河渚間有仲長子光者亦隱士也無妻子績愛其真遂相近結廬日與對酌有奴婢數人多種黍春秋釀酒養鳬鴈蒔藥草自供以周易莊老置床頭無他用心也自號東臯子雖刺史謁見皆不答終於家績髙情勝氣獨步當時性簡傲好飲酒能盡五斗自著五斗先生傳彈琴為詩著文撰酒經一卷酒譜一卷詩賦等傳世盧鴻字皓然隱居嵩山博學善八分書工詩兼畫山水樹石開元初玄宗備禮徴再三不至詔曰鴻有泰一之道中庸之德鈎深詣微確乎自髙詔書屢下每輒辭託使朕虛心引領于今有年雖得素履幽人之介而失考父滋恭之誼禮有大倫君臣之義不可廢也有司其齎束帛之具重宣兹旨想有以翻然易節副朕意焉鴻至謁見不拜宰相問狀答曰禮者忠信所薄臣敢以忠信見帝召升內殿置酒拜諫議大夫固辭復下詔許還山將行賜隱居服官營草堂鴻到山中廣精舍從學者五百人及卒詔賜萬錢營葬張彪潁上人初赴舉無所遇適遭喪亂奉老母避地隱居嵩山供養至謹與孟雲卿為中表俱工詩調雲卿有贈云善道居貧賤潔服蒙塵埃行行無定心坎壈難歸來劉方平河南人白晳美儀容二十工詞隱居潁陽大谷髙尚不仕善畫山水時汧國公李勉延致齋中甚敬愛之欲薦于朝不忍屈辭還舊隱工詩有集傳世秦系按新唐書系字公緒會稽人天寶末避亂剡溪自稱東海釣客薛兼訓奏為倉曹參軍不就客泉州南安九日山中有大杉百餘章俗傳東晉時所植系結屋其上穴石為研注老子彌年不出薑公輔以直言罷為泉州别駕見系輒窮日不能去築室與相近遂忘流落之苦公輔卒妻子在逺系為營葬山下其好義如此張志和按新唐書志和字子同婺州金華人擢明經命待詔翰林以親喪不復仕居江湖性髙邁自稱煙波釣徒撰玄真子十二卷兄鶴齡恐其遁世為築室越州東郭茅茨數椽花竹掩映嘗豹席棕屫沿溪埀釣每不投餌志不在魚也志和待詔翰林時帝嘗賜奴婢各一人志和配為夫婦號漁童樵青與陸羽嘗為顔平原食客平原初來刺湖州志和造謁顔請以舟敝欲為更之曰願為浮家泛宅往來苕霅間足矣善畫山水酒酣或擊鼓吹笛舐筆輒就曲盡天真自撰漁歌便復畫之興趣髙逺人不能及陸羽字鴻漸不知所生初竟陵禪師智積得嬰兒於水濵育為弟子及長恥從削髮以易自筮得蹇之漸曰鴻漸于陸其羽可用為儀以為姓名有學愧一事不盡其妙性詼諧少年匿優人中撰笑談萬言天寶間署羽伶師後遁去古人所謂潔其行而穢其迹者上元初結廬苕溪上閉門讀書名僧髙士談宴終日貌寢口吃而辨聞人善若在已與人期雖阻虎狼不避也自稱桑苧翁又號東岡子工古調歌詩興極間雅著書甚多扁舟往來山寺唯紗巾藤鞋短褐犢鼻擊林木弄流水或行曠野中誦古詩徘徊至月黑興盡慟哭而返當時以比接輿也與皎然上人為忘年之交有詔拜太子文學羽嗜茶著茶經三卷言茶之原之法之具時號茶仙天下益知飲茶矣鬻茗家以瓷陶羽形祀為神買十茶器得一鴻漸初御史大夫李季卿宣慰江南喜茶知羽召之羽野服挈具而入李曰陸君善茶天下所知揚子中泠水又殊絶今二妙千載一遇山人不可輕失也茶畢命奴子與錢羽愧之更著毁茶論與皇甫補闕善時鮑尚書防在越羽往依焉冉送以序曰君子究孔釋之名理窮歌詩之麗則逺墅孤島通舟必行魚梁釣磯隨意而往夫越地稱山水之鄉轅門當節鉞之重鮑侯知子愛子者將解衣推食豈徒鱠鏡水之魚宿耶溪之月而已集併茶經今傳張衆甫京口人隱居不務進取與皇甫御史曽友善精廬接近後各遊四方曽寄張處士詩曰伏臘同雞黍柴門閉雪天時宦亦有徴辟者守死善道卒不就衆甫詩婉媚綺錯巧用文字工於興喻文流中佳士也凡同在一時者有趙微明于逖蔣渙元季川俱山巔水涯苦學真士名同蘭茝之芳志非銀黃之慕吟咏性靈陶鍊衷素皆有佳篇不至湮落惜其行藏之大槩不見於記録故缺其考詳焉按唐詩紀事蔣渙宰相智周之孫中進士第永大時為鴻臚卿日本使遺以金帛不納唯取箋一杳以貽其副終吏部尚書元季川貞元大厯間詩人也原文不載似失考且蔣渙亦未可附隱逸也朱放字長通南陽人也按新唐書藝文志注放襄州人初居臨漢水遭嵗歉南來卜隱剡溪鏡湖間排青紫之念結廬雲卧釣水樵山嘗著白接離鹿裘筍履盤桓酒家時江浙名士如林風流儒雅俱從髙義如皇甫兄弟皎徹上人皆山人良友也大厯中嗣曹王臯鎮江西辟為節度參謀有别同志詩曰潺湲寒溪上自此成離别回首望歸人移舟逢暮雪頻行識草樹漸老傷年髮唯有白雲心為向東山月未幾不樂鞅掌扁舟告還貞元二年詔舉韜晦竒才特下聘禮拜左拾遺不就上表謝忘懷得失以此自終放工詩風度清越神情蕭散非尋常之比集二卷今行於世盧同范陽人初隱少室山號玉川子家甚貧惟圖書堆積後卜居洛城破屋數間而已一奴長鬚不裹頭一婢赤腳老無齒終日苦哦鄰僧送米朝廷知其清介之節凡兩備禮徴為諫議大夫不起時韓愈為河南令愛其操敬待之嘗為惡少所恐訴于愈方為申理同復慮盜憎主人願罷之愈益服其度量元和間月蝕同賦詩意譏切當時逆黨愈極稱工奄人稍恨之時王涯秉政胥怨于人及禍起同偶與諸客會食涯書館中因留宿吏卒掩捕同曰我盧山人也於衆無怨何罪之有吏曰既云山人來宰相宅容非罪乎倉忙不能自理竟同甘露之禍同老無髮奄人于腦後加釘先是生子名添丁人以為讖云同性髙古介僻所見不凡近唐詩體無遺而同之所作特異自成一家語尚竒譎讀者難解識者易知後來倣效比擬遂為一格宗師有集一卷今傳于世論曰古詩云枯魚過河泣何時悔復及作書與魴鱮相戒慎出入斯所以防前之覆轍也同志懷霜雪操擬松筠深造括囊之髙夫何户庭之失噫一蹈非地旋踵逮殃玉石俱爛可不痛哉方干字雄飛桐廬人幼有清才散拙無營務大中中舉進士不第隱居鏡湖中湖北有茅齋湖西有松島每風清月明攜稚子鄰叟輕棹往返甚愜素心所住水木幽閟一草一花俱能留客家貧蓄古琴行吟醉卧以自娛徐凝初有詩名一見干器之遂相師友因授格律干有贈凝詩云把得新詩草裏論時謂反語為村裏老疑干譏誚非也干貌陋兔缺性喜凌侮王大夫亷問浙東禮邀干至誤三拜人號為方三拜王公嘉其操將薦于朝託吳融草表行有日王公以疾逝去事不果成干早嵗偕計往來兩京公卿好事者爭延納名竟不入手遂歸無復榮辱之念浙中凡有園林名勝輒造主人留題幾遍初李頻學干為詩頻及第詩僧清越賀云弟子已折桂先生猶灌園咸通末卒門人相與論德考行諡曰玄英先生樂安孫郃等綴其遺詩三百七十餘篇為十卷王贊論之曰鏝肌滌骨氷瑩霞絢嘉肴自將不吮餘雋麗不葩芬苦不懼棘當其得志倐與神會詞若未至意已獨往郃亦論曰其秀也仙蘂于常花其鳴也靈鼉于衆響觀其所述論不為過矣論曰古黔婁先生死曾參與門人來弔問曰先生終何以諡妻曰以康參曰先生存時食不充膚衣不蓋形死則手足不斂傍無酒肉生不美死不榮何樂而諡為康哉妻曰昔先生國君用為相辭不受是有餘貴也君饋粟三十鍾辭不納是有餘富也先生甘天下之淡味安天下之卑位不戚戚于貧賤不遑遑于富貴求仁得仁求義得義諡之以康不亦宜乎方干韋布之士生稱髙尚死諡玄英其梗槩大節庶幾乎黔婁者耶陸龜蒙按新唐書龜蒙字魯望幼而聰悟有髙致藏書萬卷無聲色之娛舉進士不中從張摶遊湖蘇又至饒州三日無所詣刺史率官屬就見龜蒙不樂拂衣去居松江甫里多所撰論性不喜與俗流交雖造門亦罕納不乘馬每寒暑得中體無事時放扁舟挂篷席齎束書茶竈筆牀釣具鼓棹鳴榔太湖三萬八千頃水天一色直入空明或往來别浦所詣小不會意徑往不留自稱江湖散人中和初遘疾卒吳融誄文曰霏漠漠淡涓涓春融冶秋鮮妍觸即碎潭下月拭不滅玉上煙周朴字見素長樂人嵩山隱君也工為詩抒思尤艱每有所得必極雕琢詩家稱為月煆季鍊未及成篇已播人口取重當時如此貫休尤與往還深為憐才而朴本無奪名競利之心特以道尊德貴聲價益超耳乾符中為巢賊所得以不屈竟及於禍逺近聞之莫不流涕林嵩得其詩百餘篇為二卷僧棲浩序首今傳於世唐求隱君也成都人值三靈改卜絶念鼎鐘放曠疏逸出處悠然人多不識方外物表是所遊心也酷耽吟調氣韻清新每動竒趣工而不僻皆達者之詞所行覽不出二百里間無秋毫世俗之想論曰唐興逮季葉治日少而亂日多雖草衣帶索罕得安居當其時逺釣弋者多走山而逃海斯德而隱者矣自王君以下幽人間出皆逺騰長往之士危行言遜重撥禍機粳核軒冕挂冠引退往往見之躍身炎冷之途標華黃綺之列雖或纍聘丘園勉加冠佩適足以速深藏於藪澤耳然猶有不能逃白刃死非命焉夫迹晦名彰風髙塵絶豈不以有翰墨之妙騷雅之美也哉文章為不朽之盛事也恥不為堯舜學者之所同志致君於三五懦夫尚知勇為今則舍聲利而向山栖鹿冠烏几便於錦繡之服柴車草舍安於丹雘之厦藜羮不糝甘於五鼎之味素琴濁酒和於醇飴之奉樵青山漁白水足於佩金魚而紆紫綬也時有不同也事有不侔也向子平曰吾故知富不如貧貴不如賤第未知死何如生此達人之言也易曰遁之時義大矣哉吳筠字貞節華隂人通經義美文辭舉進士不中隱居南陽騎立山為道士天寶中玄宗遣使召至京師與語甚悅敕待詔翰林獻玄綱三篇帝問道對曰深於道者惟老子五千言其餘徒費紙札耳復問神仙冶鍊之術曰此野人之事積嵗月求之非人主所宜留意筠每陳説名教世務帝重之初筠愛會稽山水往來天台剡中與李白孔巢父相遇酬倡至是因薦於朝帝即遣使召之筠性髙鯁其待詔翰林時恃承恩顧髙力士素奉佛嘗短筠於上前筠故多著賦文深詆釋氏頗為通人所譏云後知天下將亂苦求還嵩山詔為立道觀大歷間卒弟子諡為宗元先生善為詩有集十卷權德輿序之按本傳未嘗以筠為仙因總論與韓湘吕巖等並列故編次于此顧況字逋翁蘇州人至德二年天子幸蜀江侍郎李希言下進士善為歌詩性詼謔不修檢操工畫山水初為韓晉江判官德宗時柳渾輔政薦為祕書郎況素善於李泌遂師事之得其服氣之法能終日不食及泌相自謂當得達官久之遷著作郎及泌卒作海鷗詠嘲誚權貴大為所嫉被憲劾貶饒州司户作詩曰萬里飛來為客鳥曽蒙丹鳳借枝柯一朝鳳去梧桐死滿目鴟鳶奈爾何遂全家去隱茅山鍊金拜斗身輕如羽況暮年一子暴亡追悼哀切吟曰老人喪愛子日暮泣成血老人年七十不作多時别其年又生一子名非熊三嵗始言在冥漠中聞父吟苦不忍乃來復生非熊後及第自長安歸慶已不知況所在或云得長生訣仙去矣今有集二十卷傳世皇甫湜為之序非熊姑蘇人況之子也少俊悟一覽輒能成誦工吟揚譽逺近性滑稽好辨頗雜笑言凌轢氣熖子弟既犯衆怒擠排者紛然在舉場角藝三十年屈聲被人耳會昌五年諫議大夫陳商放榜初上熟聞非熊詩價至是怪其不第敕有司進所試文章追榜放令及第劉得仁賀以詩曰愚為童稚時已解念君詩及得髙科早須逢聖主知授盱眙主簿不樂拜迎更厭鞭撻因棄官歸隱王司馬建送詩云江城柳色海門煙欲到茅山始下船知道君家當瀑布菖蒲潭在草堂前一時餞别俱吟僧名流不知所終或傳住茅山十餘年一旦遇異人相隨入深谷不復出矣有詩一卷今行于世劉商按書録解題商字子夏唐詩紀事彭城人擢進士纍官比部員外郎後出為汴州觀察判官辭疾挂印歸舊業商性好酒苦家貧常對花臨月悠然獨酌抗音長謡放適自遂賦詩曰春草秋風老此身一瓢長醉任家貧醒來還愛浮萍草漂寄官河不屬人好神仙鍊金骨後隱義興有集十卷傳世韓湘字清夫愈之姪孫也長慶三年禮部侍郎王起下進士落魄不羈見趣髙逺尤耽苦吟公勉以經學曰湘所學公不知耶因賦詩以述志云青山雲水窟此地是吾家後夜流瓊液凌晨咀絳霞琴彈碧玉調爐煉白朱砂寶鼎存金虎元田養白鴉一瓢藏世界三尺斬妖邪解造逡巡酒能開頃刻花有人能學我同去看仙葩公笑曰子能奪造化乎湘曰此事甚易公為開樽湘聚土以盆覆之噀水良久開碧花三朵花片上有詩一聨云雲橫秦嶺家何在雪擁藍關馬不前公甚怪異未喻其意曰他日驗之告去未幾公以諫佛骨事謫潮州刺史一日途中見有人冒風雪從林間來視之乃湘也再拜馬前曰公憶花上之句乎因詢其地即藍關嗟嘆久之解鞍酒壚命酌足成詩曰一封朝奏九重天夕貶潮陽路八千本為聖朝除弊事豈期衰朽送殘年雲橫秦嶺家何在雪擁藍關馬不前知汝逺來應有意好收吾骨瘴江邊又贈詩曰人才為世古來多如子雄文孰可過好待功名成就日却抽身去上煙蘿湘笑而不答獻詩别公曰舉世都為名利醉惟吾來向道中醒他時定是飛升去衝破秋空一點青遂别竟不知所終按湘本應附韓愈傳以屬方外故别編于此施肩吾字希聖睦州人元和十五年盧儲榜進士登第後謝禮部陳侍郎云九重城裏無親識八百人中獨姓施不待除授即東歸張籍羣公吟餞人皆知有仙風道骨寧戀人間升斗耶而少存箕潁之情拍浮詩酒搴攬煙霞初讀書五行俱下至是授真筌於仙長遂知逆順顛倒之法與上中下精氣神三田反覆之義以洪州西山十二真君羽化之地慕其真風髙蹈於此題詩曰重重道氣結成神玉闕金堂逐日新若數西山得道者兼余即是十三人早嘗賦間居遣興詩一百韻頗述初心大行於世著辨疑論一卷西山傳道會真等記各一卷述氣住則神住神住則形住為三住銘一卷及所為詩十卷自為之序今傳陳陶字嵩伯鄱陽劔浦人嘗舉進士輒下為詩云中原不是無麟鳳自是皇家結網疏頗負壯懷志逺心曠遂髙居不求進達恣遊名山自稱三教布衣大中中避亂入洪州西山學神仙咽氣有得出入無間時嚴宇牧豫章慕其清操嘗備齋供俯就山中揮麈談終日欲試之遣小妓蓮花往待陶笑不答蓮花賦詩求去曰蓮花為號玉為腮珍重尚書送妾來處士不生巫峽夢虛勞雲雨下陽臺陶賦詩贈之云近來詩思清於水老去風情薄似雲已向升天得門户錦衾深愧卓文君宇見詩益嘉貞節陶金骨己堅戒行通體夜必鶴氅焚香巨石上鳴金步虛禮星月少寐所止茅屋風雷洶洶不絶忽一日不見惟鼎竈杵臼依然開寶間有樵者入深谷猶見無恙後不知所終陶工賦詩無一點塵氣於晚唐諸人中最得平淡要非時流所能企及者有文録十卷今傳于世吕巖字洞賔京兆人禮部侍郎吕渭之孫也咸通初中第兩調縣令更值巢賊浩然發棲隱之志攜家歸終南自放迹江湖先是有鍾離權字雲房不知何代許人以喪亂避地太白間入紫閣石壁上得金誥玉籙深造希夷之旨常髽髻衣槲葉隱見于世巖既篤志大道遊覽名山至太華遇雲房知為異人拜以詩曰先生去後應須老乞與貧儒換骨丹雲房許以法器因為著靈寶異法十二科悉究性命之旨坐廬山中數十年金丹始就逢苦竹真人乃能驅役神鬼時移世換不復返也與陳圖南音響相接或訪其室中嘗白襴角帶賣墨於市得者皆成黃金往往遨逰洞庭瀟湘湓浦間自稱回道士時傳已蟬蛻矣有術佩劔自笑曰吾仙人安用劔為所以斷嗔愛煩惱耳常題寺壁曰三千里外無家客七百年前雲水身後書云唐室進士今時神仙足躡紫霧却歸洞天又宿湖州沈東老家白酒滿甕恣意拍浮臨去以石榴皮書壁間云西鄰已富憂不足東老雖貧樂有餘白酒釀來因好客黃金散盡為收書又嘗負局奩於市為賈尚書淬古鏡歸忽不見留詩云袖裏青蛇凌白日洞中仙果艷長春須知物外餐霞客不是塵中磨鏡人又醉飲嶽陽樓俯鑑洞庭時八月葉下水清君山如黛螺秋風浩蕩遂按玉龍作一弄清音嘹亮金石可裂久之度古柳别去留詩云朝遊南浦暮蒼梧袖裏青蛇膽氣粗三入嶽陽人不識朗吟飛過洞庭湖後往來人間乘虛上下竟莫能測至今四百餘年所在留題不可勝紀凡遇之者每去後始覺悔無及矣蓋其變化無窮吟詠不已此姑紀其大槩云陳摶字圖南譙郡人少有才術經綸易象玄機尤所精究髙論駭俗少食寡思舉進士不第時戈革滿地遂隱居辟穀煉氣撰指玄篇同道風偃僖宗召之封清虛處士居華山雲臺觀每閉門獨卧或兼旬不起周世宗召入禁中試之扃户月餘始啓摶方熟寐齁䶎覺即辭去賦詩云十年蹤迹走紅塵回首青山入夢頻紫陌縱榮爭及睡朱門雖貴不如貧愁聞劔戟扶危主悶聽笙歌聒醉人攜取舊書歸舊隱野花啼鳥一般春還山後因乘驢遊華隂市見郵傳甚急問知宋祖登基摶抵掌長笑曰天下自此定矣太宗徴赴戴華陽巾草屨垂縧與萬乘分庭抗禮賜號希夷先生時居雲臺四十年僅及百嵗帝贈詩云曽向前朝出白雲後來消息杳無聞如今已肯隨徴召總把三峯乞與君真宗復召不起為謝表略曰明時間客唐室書生堯道昌而優容許由漢世盛而善從商皓況性同猿鶴心若土灰敗荷製服脫籜裁冠體有青毛足無草屨茍臨軒陛貽笑聖朝數行丹詔徒教彩鳳銜來一片野心已被白雲留住詠嘲風月之清笑傲煙霞之表遂性所樂何得何言後鑿石室於蓮華峯一旦坐其中羽化而去有詩集今傳如洛陽潘閬逍遙河南种放明逸錢塘林逋君復巨鹿魏野仲先青州李之才挺之天水穆修伯長皆從學先生一流髙士俱有詩名大節詳見宋史云論曰晉嵇康論神仙非積學所能致斯言信哉原其本自天靈有異凡品仙風道骨迥凌雲表厯觀傳記所載霧隱乎巖巔霞寓于塵外崆洞羡門以下清流相望由來尚矣雖解化一事似或玄微正非假房中黃白之小端從而服食頤養能盡其道者也不損上藥愈益下田熊經鳥伸納新吐故無七情以奪魂魄無百慮以煎肺肝庶幾指識玄户引身長年然後一躍頓喬松之逸馭也今夫指青山首駕卧白雲振衣紛長往于斯世遺髙風於無窮及見其人吾亦願從之遊耳韓湘控鶴於前吕巖驂鸞於後凡其題詠篇什鏗鏘振作皆天成雲漢不假安排自非咀嚼氷玉呼吸煙霏孰能至此寧好事者為之多見其不知量也吳筠張志和施肩吾劉商陳陶顧況等髙躅可數皆頡頏於元化中者歟靈一按唐詩紀事靈一大厯貞元間僧也童子出家瓶鉢外無所有天性超穎追蹤謝客隱居麻源第三谷中結茅讀書後白業精進居若耶溪雲門寺從學者四方而至矣皎然字清晝吳興人俗姓謝宋靈運之十世孫也初入道肄業杼山與靈徹陸羽同居妙喜寺羽於寺傍創亭以癸丑嵗癸卯朔癸亥日落成湖州刺史顔真卿名以三癸皎然賦詩時稱三絶真卿嘗於郡齋集文士撰韻海鏡源與其論著由是聲價籍甚貞元中集賢御書院取髙僧集得上人文十卷藏之刺史于頔為之序李端在匡嶽依止稱門生一時名公俱相友善題云清晝上人是也時韋應物以古淡矯俗公嘗擬其格得數解為贄韋心疑之明日又録舊製以見始被領略曰人各有長蓋自天分子而為我失故步矣但以所詣自名可也公心服之往時住西林寺定餘多暇因撰序作詩體式兼評古今人詩為晝公詩式五卷及撰詩評三卷皆議論精當取舍從公整頓狂瀾出色騷雅公性放逸不縛於常律初房太尉琯早嵗隱終南峻壁之下往往聞湫中龍吟聲清而靜滌人雅想時有僧潛戛三金以寫之惟銅酷似房公他日至山寺聞林嶺間有聲因命僧出其器嘆曰此真龍吟也大厯間有秦僧傳至桐江皎然戛銅碗效之以警深寂緇人有獻譏者公曰此達僧之事可以嬉禪爾曹胡凝滯於物而以瑣行自拘耶時人髙之公外學超然興會間適居第一流不疑也無可髙僧也按書録解題無可賈島弟工五言詩律調謹嚴屬興清越比物以意謂之象外句如曰聽雨寒更盡開門落葉深按此傳有闕文清塞字南卿居廬嶽為浮屠客南徐亦久後來少室終南間俗姓周名賀工為近體詩格調清雅與賈島無可齊名寶厯中姚合守錢塘因攜書投刺以丐品第合延待甚異見其哭僧詩云凍鬚亡夜剃遺偈病中書大愛之因加以冠巾使復姓字時夏臘已髙榮望落落竟往依名山諸尊宿而終詩一卷今傳按周賀一傳本不應列詩僧中今按本文清塞云云其體例與他僧不殊故編于此虛中袁州人少脫俗從佛而讀書不輟工吟咏居玉笥山二十寒暑後來遊瀟湘與齊已尚顔栖蟾為詩友住湘西栗城寺司空圖懸車告老却掃閉門天下懷仰虛中欲造見論交未果因歸華山寄以詩曰門徑放莎埀往來投刺稀有時開御札特地挂朝衣嶽信僧傳去天香鶴帶歸他時周召化無復更衰微圖得詩大喜言懷云十年華嶽山前住只得虛中一首詩其見重如此貫休按唐詩紀事姓薑氏字德隱婺州蘭溪人風騷之外精於筆札成中令問其筆法休曰此事須登壇而授安可草草而言成銜之遞放黔中以病鶴詩見意曰見説氣清邪不入不知爾病自何來初昭宗以武肅王錢璆平董昌功拜鎮東軍節度使自稱吳越王僧貫休時居靈隱往投詩賀中聨云滿堂花醉三千客一劒霜寒十四州武肅大喜然僭侈之心始張遣人諭令改為四十州乃可相見休性躁急答曰州亦難添詩亦難改余孤雲野鶴何天不可飛即日褁衣鉢拂袖而去論曰貫休天賦敏速之才筆吐猛鋭之意昔謂龍象蹴踏非驢所堪果僧中之一豪也齊己長沙人按唐詩紀事齊己俗姓胡名得生早失怙恃七嵗穎悟為大溈山寺司牧往往抒思取竹枝畫牛背為小詩耆宿異之遂共推挽入戒風度日改聲價益隆過豫章時陳陶近巳仙去已留題有云夜過修竹寺醉打老僧門至宜春投詩鄭都官云自封修藥院别下著僧床谷曰善則善矣一字未安經數日來曰别掃如何谷嘉賞結為詩友薛濤字洪度成都樂妓也性辨慧嫻翰墨居浣花里種菖蒲滿門傍即東北走長安道也往來車馬留連元和中元微之使蜀密意求訪府公嚴司空知之遣濤往侍微之登翰林以詩寄之曰錦江滑膩峨嵋秀幻出文君與薛濤言語巧偷鸚鵡舌文章分得鳳凰毛紛紛詞客皆停筆箇箇公侯欲夢刀别後相思隔煙水菖蒲花發五雲髙及武元衡入相奏授校書郎蜀人呼妓為校書自濤始也後胡曽贈詩曰萬里橋邊女校書枇杷花下閉門居掃眉才子知多少管領春風總不如濤工為小詩惜成都箋幅大遂皆製狹之人以為便名曰薛濤箋且機警敏捷座間談笑風生髙駢鎮蜀門日命之佐酒行一字叶音令且得形象曰口似沒梁斗答曰川似三條椽公曰奈一條曲何曰相公為西川節度尚用一破斗況窮酒佐雜一曲椽何足怪哉其敏捷類此特多座客賞歎其所作詩稍窺良匠詞意不茍情盡筆墨翰苑崇髙輒能攀附殊不意裙裾之中出此異物豈得以匪人而棄其學哉太和中卒有錦江集五卷今傳中多名公贈答云李季蘭名冶以字行峽中人女道士也美姿容神情蕭散專心翰墨善彈琴尤工格律當時才子頗誇纎麗殊少荒艷之態始年六嵗時作薔薇詩云經時不架却心緒亂縱橫其父見曰此女聰黠非常恐為失行婦人後以交遊文士微泄風聲皆出乎輕薄之口夫士有百行女唯四德季蘭則不然形氣既雄詩意亦蕩自鮑昭以下罕有其倫時往來剡中與山人陸羽上人皎然意甚相得皎然嘗有詩云天女來相試將花欲染衣禪心竟不起還捧舊花歸其謔浪至此又嘗會諸賢於烏程開元寺知河間劉長卿有隂重之疾誚曰山氣日夕佳劉應聲曰衆鳥欣有託舉坐大笑論者兩美之天寶間玄宗聞其詩才詔赴闕留宫中月餘優賜甚厚遣歸故山評者謂上比班姬則不足下比韓英則有餘亦一俊姬也有集今傳于世魚玄機長安人女道士也性聰慧好讀書及笄為李億補闕侍寵夫人妬不能容億遣𨽻咸宜觀披戴有怨李詩云易求無價寶難得有心郎與李郢端公同巷居止接近詩筒往返嘗登崇真觀南樓觀新進士題名榜賦詩曰雲峯滿目放春晴厯厯銀鈎指下生自恨羅衣掩詩句舉頭空羡榜中名觀其志意激切使為一男子必有用之才作者頗賞憐之論曰詩云關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉故古詩之道各存六義然終歸于正不離乎雅是以古昔賢婦人散情文墨班班簡牘未易槩而論之後來班姬傷秋扇以暫恩謝娥咏絮雲而同素大家七誡執者修省蔡琰胡笳聞而心折率以明白之操徽美之誠欲見於悠逺寓文以宣情含亳而見志使人擊節霑灑彈指追念良有謂焉噫筆墨固非女子之事亦在用之如何耳茍天有可逃禮不必備則詞為自獻之具詩有妬情之作衣服酒食無間靜之容鉛華膏澤多鮮飾之態故不相宜矣是播惡於衆何關雎之義哉厯觀唐以雅道奬士類而閨閣英秀亦能熏染錦心繡口蕙情蘭性是可尚矣中間如李季蘭魚玄機皆躍出方外修清淨之教陶寫幽懷留連光景逍遙間暇之功無非雲水之念與名儒比隆珠往瓊復然浮艷委託之心終不能盡白璧微瑕惟在此耳薛濤流落歌舞以靈慧獲名當時此亦難矣三者既不可略他如劉媛劉雲鮑君徽崔仲容道士元淳薛媪崔公達張窈窕程長文梁瓊亷氏姚月華裴羽仙劉瑶常浩葛鴉兒崔鶯鶯談意哥户部侍郎吉中孚妻張夫人鮑參軍妻文姬杜羔妻趙氏張建封妾盻盻南楚材妻薛媛等皆雅擅華藻才色雙美者也或望幸離宫傷寵後掖或從軍萬里斷絶音耗或祗役連年迢遙風水或為蕩子妻或為商人婦花雨春夜月露秋天玄鳥將謝賓鴻來屆搗錦石之流黃織回文於緗綺魂夢飛逺關山到難當此時也濡毫命素寫怨書懷一語一聨俱堪墮淚至若間以丰麗雜以纎穠導淫奔之約敘久曠之情不假緑琴但飛紅紙中間不能免焉尺有短而寸有長故未欲椎埋之云爾雜傳記中多録鬼神靈怪之詞哀調深情不異疇昔然影響所託理亦荒唐故不能一一盡之按本文所云則原書于鬼神靈怪之詞當亦略為采録今俱佚矣此條當是其總論結語以無所屬附之末簡唐才子傳卷八終
