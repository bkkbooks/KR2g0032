body:
  text: 唐才子傳巻三元辛文房撰嚴維古之竒耿湋張南史蘇涣吉中孚司空曙李端竇叔向子常牟羣庠鞏章八元于鵠冷朝陽李益暢當崔峒夏侯審朱灣權徳輿武元衡張登麴信陵姚係弟倫羊士諤楊巨源韓愈張署陳羽王涯栁宗元王建孟郊陸長源張籍劉义李賀嚴維字正文越州人初隠居桐廬慕子陵之高風至徳二年江淮選補使侍郎崔涣下以詞藻宏麗進士及第家貧親老不能逺離授諸暨尉時巳四十餘後歴秘書郎嚴中丞節度河南辟佐幕府遷餘姚令仕終右補闕維少無宦情懐家山之樂以儒素從升斗之禄聊代耕爾詩情雅重挹魏晉之風鍜鍊鏗鏘庶少遺恨一時名輩孰匪金蘭詩集一巻今𫝊古之竒寶應二年禮部侍郎洪源下及第與耿湋同時嘗為安西幕府書記與李司馬端有金蘭之好工古調足幽閒淡泊之思婉而成章得名藝圃不泛然矣詩集𫝊於世耿湋河東人也寶應二年洪源榜進士與古之竒為莫逆交初為大理司法充括圖書使來江淮窮山水之勝仕終右拾遺詩才俊爽意思不羣似湋等軰不可多得詩集二巻今𫝊於世張南史字季直幽州人工奕棋神算無敵游心太極嘗幅巾藜杖出入王侯之宅十年高談濶視慷慨竒士也中歳感激始苦節學文無希世茍合之意數年間稍入詩境調體超閒情致兼美如并燕老将氣韻沉雄時少及之者肅宗時廟堂奨㧞仕為左衛倉曹㕘軍後避亂寓居揚子平難再召未及赴而卒有詩一巻今𫝊蘇涣廣徳二年楊栖梧榜進士少好姦利往來剽盜善用白弩巴賨商人苦之稱曰白跖後自知非折節從學遂成名累遷御史湖南崔中丞瓘辟為從事瓘遇害繼走交廣扇動哥舒晃叛如蛟龍見血本質彰矣居無何伏誅初嘗為變律詩十九首上廣州節度李勉其意長於諷刺亦有陳拾遺一鱗半甲故勉加禮待之或曰此子羽翼嬖臣侵敗王略今尚其文可歟勉曰漢策載蒯通説辭皇史録祖君檄草此大容細者善惡必書春秋至訓言有不廢孔子格談涣其庶乎豈但存雕蟲小技亦以深懲賊子耳時以為名言杜甫有與贈荅之詩今悉𫝊詩云再聞誦新作突過黄初詩今晨清鏡裏勝食齋房芝吉中孚楚州人居鄱陽最乆初為道士山阿寂寥後還俗李端贈詩云聞道華陽客儒衣謁紫微舊山連藥賣孤鶴帶雲歸栁市名猶在桃源夢已稀還家見鷗鳥應媿背船飛盧綸送詩云舊籙藏雲穴新詩滿帝鄉來長安謁宰相有薦於天子日與王侯高㑹名動京師無幾何第進士授萬年尉除校書郎又登宏詞科為翰林學士歴諫議大夫户部侍郎判度支事貞元初卒初拜官後以親埀白在堂歸養至孝終喪復仕中孚神骨清虚吟詠高雅若神仙中人也集一巻今𫝊司空曙字文初廣平人也磊落有竒才韋臯節度劍南辟致幕府授洛陽主簿未幾遷長林縣丞累官左拾遺終水部郎中與李約員外至交性耿介不干權要家無甔石宴如也嘗病中不給遣其愛姬亦嘗流寓長沙遷謫江右多結契雙林暗傷流景寄暕上人詩云欲就東林寄一身尚憐兒女未成人柴門客去殘陽在藥圃蟲喧秋雨頻近水方同梅市隠曝衣多笑阮家貧深山蘭若何時到羨與閒雲作四隣閒園即事高興可知屬調幽閒終篇調暢如新花笑日不容重染鏘鏘美譽不亦宜哉有詩集二巻今𫝊於世李端趙州人嘉祐之姪也少時居廬山依皎然讀書意况清虛酷慕禪侣大歴五年李摶榜進士及第授秘省校書郎以清羸多疾辭官居終南山草堂寺未幾起為杭州司馬牒訴敲朴心甚厭之買田園在虎丘下為耽深僻泉石少幽移家來隠衡山自號衡嶽幽人彈琴讀易登高望逺神意泊然初無宦情懐箕潁之志嘗曰余少尚神仙且未能去友人暢當以禪門見導余心知必是未得其門詩更高雅於才子中名響錚錚與處士京兆栁中庸大理評事江東張芬友善唱酬初來長安詩名大振時令公子郭曖尚昇平公主賢明有才延納俊士端等皆在館中曖嘗進官大宴酒酣主屬端賦詩頃刻而就曰青春都尉最風流二十功成便拜侯金距鬬雞過上苑玉鞭騎馬出長秋熏香荀令偏憐小傅粉何郎不觧愁日暮吹簫楊栁陌路人遥指鳯凰樓主甚喜一座賞歎錢起曰此必端宿製請以起姓為韻端立獻一章曰方塘似鏡草芊芊初月如鈎未上弦新開金埓看調馬舊賜銅山許鑄錢楊栁入樓吹玉笛芙蓉出水妬花鈿今朝都尉如相顧願脱長裾逐少年見者驚服主厚賜金帛終身以榮其工㨗類此集三巻今𫝊於世竇叔向字遺直扶風平陵人也有卓絶之行登第於大歴初逺振佳名為文物冠冕詩法謹嚴又非常格名流才子多仰飇塵少與常衮同燈火及衮相引擢左拾遺内供奉衮坐貶亦出為溧水令卒贈工部尚書五子常牟羣庠鞏俱能詩咄咄有跨竈之譽當時美之藝文志載叔向集七巻今存詩甚寡盖零落乆矣常按此下有脱文考新唐書常字中行大歴中及進士第仕至國子祭酒兄弟五人聨芳比藻詞價藹然法度風流相距不逺且俱陳力王事膺寵清流豈懐玉迷津區區之比哉後人集其所著詩通一百首為五巻名竇氏聫珠集謂若五星然常集十八巻及撰韓翃至皎然三十人詩合三百五十篇為南薫集各繋以贊為三巻今並𫝊焉牟按新唐書牟字貽周貞元二年張正甫榜進士初學問於江東家居孝謹善事繼母竒文異行聞於京師舅給事中袁高當時專重名甄㧞甚多而牟未嘗干謁竟㨗文場始佐六府五公八遷至檢校虞部元和五年拜尚書虞部郎中轉洛陽令都官郎中出為澤州刺史仕終國子司業牟晚從昭義盧從史從史寖驕牟度不可諫即移疾歸居東都别業卒昌黎韓先生為墓誌云羣按新唐書羣字丹列隠毗陵稱處士性至孝定省無少怠及母卒哀痛不已齧一指置棺中結廬墓次終喪蘇州刺史韋夏卿舉孝亷徳宗擢為左拾遺仕至御史中丞後出為黔南觀察使遷容管經畧使卒官所家無餘財惟圖書萬軸耳庠按新唐書庠字胄卿嘗應辟三佐大府調奉先令遷東都留守判官拜户部員外郎貞元中出為婺登二州刺史平生攻文甚苦著述亦多今並𫝊鞏按新唐書鞏字友封状貎瑰偉少博覽無不通性宏放好談古今所居多長者車轍時諸兄已逹鞏尚來塲屋間頗抑初志作放魚詩云黄金贖得免刀痕聞道禽魚亦感恩好去長江千萬里不須辛苦上龍門人知其述懐也元和二年王源中榜進士佐淄青幕府累遷秘書少監拜御史中丞仕終武昌觀察副使鞏平居與人言不出口時號為囁嚅翁云章八元按新唐書藝文志注八元睦州人登大歴進士第初長安慈恩寺浮圖前後名流詩版甚多八元亦題有云初怪鳥飛平地上自驚人語半天中後元微之白樂天至塔下遍覽因悉除去惟存八元版在吟咏乆之曰名下無虚士也按此𫝊有闕文于鵠初買山於漢陽高隠三十猶未成名大歴中薦歴諸府從事出塞入塞馳逐風沙工詩有集今𫝊冷朝陽金陵人大歴四年齊映榜進士及第不待調官言歸省覲自状元以下一時名士大夫及詩人李嘉祐李端韓翃錢起等大㑹賦詩攀餞以一布衣才名如此人皆羨之朝陽工詩在大歴諸才子法度稍弱字韻清越不減也有集𫝊世李益字君虞隴西姑臧人大歴四年齊映榜進士調鄭縣尉同輩行稍進逹益乆不升欝欝去遊燕趙間幽州節度劉濟辟為從事未幾又佐邠寧幕府風流有辭藻與宗人賀相埓毎一篇就樂工賂求之被於雅樂供奉天子如征人早行篇天下皆施之繪畫二十三受策秩從軍十年運籌決勝尤其所長往往鞍馬間為文横槊賦詩故多抑揚激厲悲離之作高適岑參之流也憲宗雅聞其名召為秘書少監集賢殿學士自負其才淩轢士衆有不能堪諫官因暴其詩不上望京樓等句以為涉怨望詔降職俄復舊除侍御史遷禮部尚書致仕太和初卒益少有僻疾多猜忌防閑妻妾過為苛酷有散灰扄户之談時稱為妒癡尚書李十郎有同姓名者為太子庶子皆在朝人恐莫辨謂君虞為文章李益庶子為門户李益云有集今𫝊暢當按唐詩紀事當河東人歴官果州刺史多往來嵩華間結念方外頗􅄁禪道故多松桂之興深存不死之志詞名藉甚表表凌雲有詩二巻𫝊世崔峒博陵人工文有聲初辟潞州功曹後歷左拾遺終右補闕詞彩炳然意思方雅時人稱其句為披沙揀金往往見寶詩集一巻今行於世夏侯審初於華山下買田園為别墅水木幽閒雲煙浩𣺌晚嵗退居其下吟諷頗多今稍零落時見一二皆錦製也朱灣字巨川大歴時隠君也號滄洲子率履貞素潛輝不翟日逍遥雲山琴酒之間放浪形骸繩檢之外郡國交徴不應工詩格體幽逺興㑹宏深寫意因時窮理盡性尤精詠物必含比興多敏㨗之竒及李勉鎮永平嘉其風操厚幣邀署為府中從事日相談讌分逾骨肉乆之嘗謁湖州崔使君不得志臨發以書别之曰灣聞蓬萊之山藏杳㝠而可到貴人之門無媒而通不可到驪龍之珠潛瀇滉而可識貴人之顔無因而前不可識自假道路問津主人一身孤雲兩度圓月載請職事三趨㦸門信知庭之與堂不啻千里向寄食漂母夜眠漁舟門如龍而難登食如玉而難得食如玉之粟登如龍之門實無機心翻成機事漢隂丈人聞之豈不大笑屬谿上風便囊中金貧望甘棠而歎自引分而還灣白遂歸㑹稽山隂别墅其耿介類如此也有集四巻今𫝊權徳輿按新唐書徳輿字載之未冠以文章稱諸儒間韓洄黜陟河南辟置幕府徳宗聞其才召為太常博士改左補闕累上書直言遷起居舎人憲宗初歴兵部侍郎太子賔客陳説謀畧多中徳輿善辨論開陳古今覺悟人主為輔相尚寛不甚察察封扶風郡公有文集今𫝊武元衡按新唐書元衡字伯蒼秉政早朝遇盜從暗中射殺之元衡工詩嘗夏夜作詩曰夜乆喧暫息池臺唯月明無因駐清景日出事還生翌日遇害詩盖其䜟也按此𫝊有闕文張登初隠居性剛潔幅巾短褐交友名公後就辟歴􅄁戎幕遷廷尉平乆之升監察御史貞元中改河南士曹掾遷殿中侍御史漳州刺史退居告老嘗晚春乗輕車出南薫門抵暮詣宜春門入闗吏捧牌請書官位登醉題曰閒遊靈沼送春回闗吏何須苦見猜八十老翁無品秩三曽身到鳯池來其狷迂如此數年坐公累被劾吏議捃摭不堪感疾而卒集六巻權徳輿為序云麴信陵貞元元年鄭全濟榜及第仕為舒州望江縣令卒工詩有集一巻今𫝊姚係河中人貞元元年進士與韋應物同時有詩名工古調善彈琴好遊名山希蹤謝郭終身不言禄禄亦不及之也與林棲谷隠之士往還酬酢興趣超然弟倫詩亦清麗有集並𫝊羊士諤貞元元年禮部侍郎鮑防下進士順宗時累至宣歙巡官為王叔文所惡貶汀州寧化尉元和初宰相李吉甫知奨擢為監察御史掌制後以與竇羣呂温等誣論宰執出為資州刺史士諤工詩妙造梁選作皆典重早嵗嘗遊女几山有卜築之志勲名相迫不遂初心有詩集行於世楊巨源字景山蒲中人貞元五年劉大貞下第二人及第初為張𢎞靖從事拜虞部員外郎後遷太常博士國子祭酒太和中為河中少尹入拜禮部郎中巨源才雄學富用意聲律細挹得無窮之源緩雋有愈永之味長篇刻琢絶句清泠盖得於此而失于彼者矣有詩一巻行於世韓愈按愈𫝊闕論曰公英偉間生才名冠世繼道徳之統明列聖之心獨濟狂瀾詞彩燦爛齊梁綺艷毫髪都捐有冠冕珮玉之氣宫商金石之音為一代文宗使頽綱復振豈易言也哉固無辭足以贊述云至若歌詩累百篇而驅駕氣勢若掀雷走電撐決於天地之垠詞鋒學殖先有定價也時功曹張署亦工詩與公同為御史又同遷謫唱荅見於集中有詩賦雜文等四十巻行於世陳羽江東人貞元八年禮部侍郎陸贄下第二人登科與韓愈王涯等為龍虎榜後仕歴東宫衛佐羽工吟與靈一上人交遊唱荅寫難状之景了了目前含不盡之意皎皎言外如自遣詩云稚子新能編筍笠山妻舊觧補荷衣秋山隔岸清猿叫湖水當門白鳥飛此景何處無之前後誰能道者二十八字一片畫圖非造次之謂也警句甚多有集𫝊於世王涯按新唐書涯字廣津博學工文尤多雅思舉宏詞憲宗時為知制誥翰林學士遷户部尚書監鹽鐵使涯𣙜鹽苛急百姓怨之及甘露禍起就誅悉詬罵投以瓦礫須臾成堆按此𫝊有闕文論曰否泰姤復盈虚消息廼理之常夫物盛者衰之漸也散者積之極也有能終滿而不覆者乎况圖書入變化之際神物所深忌者焉前修耽玩成癖往往殺身猶非剽剥而至也王涯掊克聚斂以邀穹爵逼孤淩弱以積珍竒知己之利忘人之害至於天奪其魄鬼瞰其家一旦飄零殊可長嘆孟子曰死矣盆成括𫝊曰貨悖而入者亦悖而出不亦宜哉用備列之庶來者少戒云栁宗元第進士調藍田尉累遷監察御史裏行與王叔文韋執誼善二人引之謀事擢禮部員外郎欲大用值叔文敗貶邵州刺史半道有詔貶永州司馬遍貽朝士書言情衆忌其才無為用心者元和十年徙栁州刺史時劉禹錫同謫得播州宗元以播州非人所居且禹錫有老母具奏以栁州讓禹錫而自往播㑹大臣亦有為請者遂改連州宗元在栁多惠政及卒百姓追慕立祠享祀血食至今宗元天才絶倫文章卓偉一時輩行咸仰之王建字仲初潁川人大歴十年丁澤榜第二人及第釋褐授渭南尉調昭應縣丞諸司歴薦遷太府寺丞秘書丞侍御史太和中出為陜州司馬從軍塞上弓劍不離身數年後歸卜居咸陽原上初遊韓吏部門墻為忘年之友與張籍契厚唱荅尤多工為樂府歌行格幽思逺二公之體同變時流建性耽酒放浪無拘宫詞特妙前古建初與樞宻使王守澄有宗人之分守澄以弟呼之談間故多知禁掖事作宫詞百篇後因過燕飲以相譏謔守澄深銜之忽曰吾弟所作宫詞内庭深邃何由知之明當奏上建作詩以謝末句云不是姓同親向說九重争得外人知守澄恐累已事遂寢建才贍有作皆工盖嘗䟦涉長途分甘窮苦其自傷詩云衰門海内幾多人滿眼公卿總不親四授官資原七品再經婚娶尚單身圖書亦為頻移盡兄弟還因數散貧獨自在家常作客黄昏哭向野田春又於征戍遷謫行旅離别幽居宦况之作俱能感動神思道人所不能道也集十巻今𫝊於世孟郊按新唐書郊字東野湖州武康人調溧陽尉縣有投金瀬平陵城林薄蓊翳下有積水郊間往坐水傍命酒揮琴裴囘賦詩終日而曹務多廢縣令白府以假尉代之按此下有闕文郊卒鄭餘慶給錢數萬營𦵏仍贍其妻子者累年張籍諡為貞曜先生門人逺赴心喪郊拙於生事一貧徹骨裘褐懸結未嘗俛眉為可憐之色然好義者更遺之工詩大有理致韓吏部極稱之多傷不遇年邁家空思苦竒澁讀之毎令人不懽如借車載家具家具少於車如謝炭云吹霞弄日光不定暖得曲身成直身如愁人獨有夜燭見一紙鄉書淚滴穿如下第云棄置復棄置情如刀劍傷之類皆哀怨清切窮入㝠搜其初登第吟曰昔日齷齪不足嗟今朝曠蕩恩無涯春風得意馬蹄疾一日看盡長安花當時議者亦見其氣度窘促卒漂淪薄宦詩䜟信有之矣天實為之謂之何哉時陸長源工詩相與來往篇什稍多亦佳作也按唐詩紀事長源呉人董晉帥宣武卒長源為之留後持法峭刻為軍所殺張籍字文昌按新唐書籍和州烏江人貞元十五年封孟紳榜及第授秘書郎歴太祝除水部員外郎初至長安謁韓愈一㑹如平生歡才名相許論心結契愈力薦為國子博士然性狷直多所責諷於愈愈亦不忌之時朝野名士皆與遊如王建賈島于鵠孟郊諸公集中多所贈答情愛深厚皆别家千里遊宦四方瘦馬羸童青衫烏㡌故毎邂逅於風塵必多殷勤之思銜盃酬唱又况於同志者乎聲調相似况味頗同籍於樂府古風與王司馬自成機軸絶世獨立自李杜之後風雅道䘮至元和中葉元白歌詩為海内宗匠謂之元和體病格稍振無愧洪河砥柱也樂天贈詩曰張公何有者業文三十春尤工樂府詞舉代少其倫有集七巻𫝊於世劉义節士也少尚義行俠傍觀切齒因被酒殺人亡命㑹赦乃出更改志從學能博覽為歌詩議論多出于正义剛直能靣白人長短其服義則又彌縫若親屬後以争語不能下嘗持韓愈金去曰此諛墓中人所得也不若與劉君為夀遂持去客遊齊魯不知所終有詩二十七篇𫝊世李賀七嵗能辭章名動京師韓愈皇甫湜覽其作竒之而未信曰若是古人吾曹或不知是今人豈有不識之理遂相過其家使賦詩賀總角荷衣而出欣然承命旁若無人援筆題曰高軒過二公大驚以所乘馬命聫鑣而還親為束髪賀疾篤恍惚晝見人緋衣駕赤虬騰下持一版書若太古雷文曰上帝新作白玉樓成立召君作記賀叩頭辭謂母老病其人曰天上比人間差樂不苦也居頃之牕中勃勃煙氣聞車聲甚速遂絶死時纔二十七莫不憐之賀詩稍尚竒詭組織花草片片成文所得皆驚邁絶去翰墨畦逕時無能效者樂府諸詩雲韶衆工皆諧之律吕嘗歎曰我年二十不意一生愁心如欲謝梧桐葉矣李藩綴集其歌詩因託賀表兄訪所遺失并加㸃竄付以成本彌年絶跡及詰之曰毎恨其傲忽其文已焚之矣今存十之四五杜牧為序者五巻今𫝊論曰老子曰其進鋭者其退速信然賀天才俊㧞弱冠而有極名天奪之速豈恡也耶若少假行年涵養盛徳觀其才不在古人下矣今兹惜哉唐才子傳巻三
