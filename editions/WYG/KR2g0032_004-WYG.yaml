body:
  text: 唐才子傳巻四元辛文房撰張仲素戴叔倫長孫佐輔劉言史李約張又新楊衡李渉朱晝張碧子瀛雍裕之白居易元稹李紳賈島莊南傑鮑溶殷堯藩沈亞之李廓張祐崔涯熊儒登徐凝韓琮韋楚老張仲素字繪之貞元十四年李隨榜進士與李翔吕温同年以中朝無援不調潜曜乆之復中博學宏辭始任武康軍從事貞元二十年遷司勲員外郎除翰林學士時憲宗求盧綸詩文遺草敕仲素編集進之後拜中書舍人仲素能屬文法度嚴確魏文帝有云文以意為主以氣為輔以詞為衛此言得之矣其次詞未達而意先備也善詩多警句尤精樂府往往和在宫商古人有未能慮及者集一卷及賦樞三卷今傳戴叔倫按新唐書云叔倫字幼公潤州金壇人賦性温雅善舉止能清談無賢不肖相接盡心工詩貞元十六年陳權榜進士嘗在租庸幕下數年夕惕匪怠吏部尚書劉公與祠部員外郎張繼書博訪選材日揖賓客叔倫投刺一見稱心遂就薦累遷撫州刺史政擬龔黄民樂其治圜扉寂然鞠為茂草詔書褒美封譙郡男加金紫後遷容管經畧使威名益振治亦清明仁恕多方所至稱最徳宗賦中和節詩遣使者寵賜世以為榮還上表請為道士未幾卒叔倫初以淮汴宼亂魚肉江上攜親族避地來鄱陽肄業勤苦志樂清虚閉門却掃與處士張衆甫朱放素厚范張之期曽不虚月詩興悠逺毎作驚人有述藁十巻今𫝊於世長孫佐輔朔方人舉進士下第放懐不羈弟公輔貞元間為吉州刺史遂往依焉後卒不宦隠居以求志然風流醖藉一代名儒詩格詞情繁縟不雜卓然有英邁之氣毎見其擬古樂府數篇極怨慕傷感之心如水中月如鏡中相言可盡而理無窮也集今𫝊劉言史少尚氣節不舉進士工詩美麗恢贍世少其倫冀鎮節度使王武俊頗好詞藝言史造之特加敬異武俊甞獵有雙鴨起蒲稗間一矢聫之遂於馬上草射鴨歌以獻因表薦請官詔授棗强令辭疾不就當時重之李約字存博汧公李勉之子也元和中仕為兵部員外郎與主客員外張諗極相知毎聫枕静言逹旦不寐常贈韋况曰我有心中事不向韋郎説秋夜洛陽城明月照張八性清潔寡欲一生不近粉黛博古探竒初汧公海内名臣多蓄古今玩器約愈好之所居軒屏几案必置古銅怪石法書名畫皆歴代所寳座間悉雅士清談終日彈琴煮茗心畧不及塵事也嘗使江南於海門山得雙峯石及緑石琴並為好事者𫝊閟然亦寓意未嘗戛然寡情豪奪恡與復嗜茶與陸羽張又新論水品特詳曾授客煎茶法曰茶須暖火炙活火煎當使湯無妄沸始則魚目散布㣲㣲有聲中則四畔泉湧纍纍然終則騰波鼓浪水氣全消此老湯之法固須活火香味俱真矣時知音者賞之有詩集後棄官終隠又著東杓引譜一巻今𫝊張又新按新唐書又新字孔昭善為詩恃才多轥籍其淫蕩之行率見於篇嘗曰我少年擅美名意不欲仕宦惟得美妻平生足矣娶楊䖍州女有徳無色殊怏怏後遇淮南李紳筵上得一歌姬與之偕老其狂斐類此性嗜茶自著煎茶水記一巻及詩文等行于世按新唐書又新𫝊又新初附李逢吉後附李訓盖僉人也原文未載當有脱佚楊衡字仲師霅人天寳間避地西來與符載崔羣李渤同隠廬山結草堂于五老峯下號山中四友日以琴酒寓意雲月遣懐衡詩工苦于聲韻竒拔非常格無敢窺其涯涘常吟罷自賞其作扺掌大笑長謡曰一一鶴聲飛上天謂其響徹如此人亦嘆服試大理評事徃來多山僧道士為方外之期詩一巻今𫝊於世李渉洛陽人渤之仲兄也自號清溪子早嵗客梁園數逢兵亂避地南來樂佳山水卜隠匡盧香爐峰下石洞間嘗養一白鹿甚馴狎因名所居曰白鹿洞與弟渤崔膺昆季茅舍相接後徙居終南偶從陳許辟命從事行軍未幾以罪謫夷陵宰十年蹭蹬峽中病瘧成痼自傷羇逐頭顱又復如許後遇赦得還賦詩云荷蓑不是人間事歸去滄浪有釣舟遂放船重來訪吳楚舊逰登天台石橋望海得風水之便挂席浮瀟湘岳陽逢張祜話故因盤桓焉歸洛下營草堂隠少室身自耕耘妾能織絍稚子供漁樵拓落生計伶俜酒鄉罕交人事太和中宰相累薦徴起為太學博士致仕卒妻亦入道渉工為詩詞意卓犖不羣世俗長篇叙事如行雲流水無可牽制才名一時傾動初嘗過九江􅔉口遇盜客方跧伏問何人曰李山人豪首曰若是勿用剽奪乆聞詩名願題一篇足矣渉欣然書曰暮雨瀟瀟江上村緑林豪客夜知聞他時不用藏名姓世上如今半是君盗喜因以牛酒厚遺再拜送之夫以跖蹻之軰猶曰憐才而至寳横道君子不顧忍哉詩集一巻今𫝊朱晝廣陵人按唐詩紀事晝元和間進士貞元間慕孟郊之名為詩格範相似曾不逺千里而訪之不厭勤苦體尚竒澁與李渉友善相酬唱晝古鏡詩云我有古時鏡初自壊陵得蛟龍猶泥蟠魑魅幸月蝕磨乆見菱蕋青於藍水色贈君將照心無使心受惑凡如此警策者頗多今𫝊於世張碧字太碧貞元間舉進士累不第便覺三山跬歩雲漢咫尺初慕李翰林之髙躅一杯一詠必見清風故其名字亦皆逼似如司馬長卿希藺相如為人也天才卓絶氣韻不凡委興山水投閒吟酌言多野意俱狀難摹之景焉有歌行集二巻𫝊世子瀛瀛碧之子也仕廣南劉氏官至曹郎甞為詩贈琴棋僧云我嘗聴師法一説波上蓮花水中月不垢不浄是色空無法無空亦無滅我嘗對師禪一觀浪溢鼇頭蟾魄滿河沙世界盡空空一寸寒灰冷燈畔我又聞師琴一撫長松喚住秋山雨絃中雅㺯若鏗金指下寒泉流太古我又看師碁一著山頂坐沉紅日脚阿誰稱是國手人羅浮道士賭却鶴輸却藥葫蘆斟下紅霞丹束手不敢争頭角同列見之曰非其父不生是子瀛為詩尚氣而不怒號語新意卓人所不思者輒能道之綽綽然見乃父風也有詩集今𫝊於世雍裕之蜀人有詩名貞元後數舉進士不第飄蓬四方為樂府極有情致集一巻今𫝊白居易按新唐書云居易字樂天其先太原人又徙下邽弱冠名未振觀光上國謁顧况况吳人恃才少所推可因謔之曰長安百物皆貴居大不易及覽詩巻至離離原上草一嵗一枯榮野火燒不盡春風吹又生乃嘆曰有句如此居天下不難老夫前言戲之耳居易厯左拾遺時盜殺宰相京師洶洶居易上䟽請亟捕賊權臣有嫌其出位怒之俄有言居易母墮井死而賦新井篇言既浮華行不可用貶江州司馬初來九江居廬阜峯下作草堂燒丹欲自除其病後以忠鯁遭擯仕情頓爾索寞卜居履道里與香山僧如滿等種樹搆石樓鑿八節灘為㳺賞之樂茶鐺酒杓不相離科頭箕踞談禪詠古晏如也晚節好佛經月不葷稱香山居士按居易傳有脱文今就永樂大典所載五條編録元稹河南人九嵗工屬文十五擢眀經對䇿第一拜左拾遺上書言利害當路惡之後拜監察御史按獄東川還次敷水驛中人仇士良夜至稹不譲邸仇怒擊稹敗面宰相以稹年少威輕失憲臣體貶江陵士曹參軍按元稹𫝊有闕文李紳按新唐書紳字公垂拜中書侍郎為人短小精悍於詩特有名號短李按紳傳闕祗存此三語賈島字浪仙范陽人也初連敗文塲囊箧空甚遂為浮屠名無本來東都旋往京師居青龍寺時禁僧午後不出為詩自傷元和中元白變尚輕淺島獨按格入僻以矯浮豔當㝠搜之際前有王公貴人皆不覺逰心萬仞慮入無窮自稱碣石山人甞嘆曰知余素心者惟終南紫閣白閣諸峯隠者耳嵩丘有草廬欲歸未得逗留長安雖行坐寢食苦吟不輟嘗跨蹇驢張盖横截天衢時秋風正厲黄葉可掃遂吟曰落葉滿長安方思屬聫杳不可得忽以秋風吹渭水為對喜不自勝因唐突大京兆劉栖楚被繫一夕旦釋之後復乗閒䇿蹇訪李凝幽居得句云鳥宿池邉樹僧推月下門又欲作僧敲練之未定吟哦引手作推敲之勢傍觀亦訝時韓退之尹京兆車騎方出不覺衝至第三節左右擁到馬前島具實對未定推敲神逰象外不知迴避韓駐馬久之曰敲字佳遂並轡歸共論詩道結為布衣交遂授以文法去浮屠舉進士愈贈詩云孟郊死𦵏北邙山日月風雲頓覺閒天恐文章渾斷絶再生賈島在人間自此名著時新及第寓居法乾無可精舍姚合王建張籍雍陶皆琴樽之好一日宣宗㣲行至寺聞鐘樓上有吟聲遂登焉于島案取卷覽之島不識因作色攘臂睨而奪取之曰郎君鮮醲自足何㑹此也帝下樓去既而覺之大恐伏闕待罪上訝之他日有中旨令與一清官謫去主者乃授遂州長江主簿後稍遷晉州司倉臨死之日家無一錢惟病驢古琴而已當時誰不愛其才而惜其命薄島貌清意雅好談禪宗𤣥理所交悉塵外之人况味蕭條生計岨峿自題曰二句三年得一吟雙淚流知音如不賞歸卧故山秋毎至除夕必取一嵗所作置几上焚香再拜酹酒祝曰此吾終年苦心也痛飲長謡而罷今集十巻并詩格一巻𫝊于世莊南傑與賈島同時曾從受學工樂府雜歌詩體似長吉氣雖壯遒語過鐫鑿盖其天資本劣未免按抑不出自然亦一好竒尚僻之士耳集二巻今行鮑溶字徳源元和四年韋瓘榜進士在楊汝士一時與李端公益少同袍為爾汝交初隠江南山中避地家苦貧勁氣不擾羇旅四方登臨懐昔皆古今絶唱過隴頭古天山大坂泉水嗚咽分流四下賦詩曰隴頭水千古不堪聞生歸蘇屬國死别李將軍細響風凋草清哀鴈入雲其警絶大槩如此古詩樂府可稱獨歩盖其氣力宏贍博識清度雅正髙古衆才無不備具云卒飄蓬薄宦客死三川有集五巻今𫝊殷堯藩秀州人天性簡静眉目如畫工詩文耽丘壑之趣嘗曰吾一日不見山水與俗人談便覺胷次塵土堆積急呼濁醪澆之聊解穢耳元和九年韋貫之放榜堯藩落第楊尚書大為稱屈料理因擢進士數年為永樂縣令一舸之官彈琴不下堂而人不忍欺雍陶寄詩曰古縣蕭條秋景晚昔時陶令亦如君頭巾漉酒臨黄菊手板支頥向白雲百里豈能容驥足九霄終自别雞羣相思不恨書來少佳句多從闕下聞與沈亞之馬戴為詩友贈答甚多後仕終侍御史堯藩初逰韋應物門墻分契莫逆及來長沙尚書李翺席上有舞柘枝者容語悽惻因感而賦詩以贈曰姑蘇太守青娥女流落長沙舞柘枝滿座繡衣皆不識可憐紅粉淚雙埀衆客驚問之果韋公愛姬所生女也相與吁歎翺即命削丹書於賓館中擇士嫁之今有集一巻𫝊世皆鏗鏘藴藉之作也沈亞之字下賢吳興人初至長安與李賀結交舉進士不第為歌以送歸元和十年侍郎崔羣下進士涇原李彚辟為掌書記遷祕書省正字長慶中補櫟陽令四年遷福建團練副使事徐晦後累遷殿中丞御史内供奉太和三年栢耆宣慰徳州取為判官耆罷亞之貶南康尉後終郢州掾亞之以文詞得名然狂躁貪冒輔耆為惡頗慿陵晚逹故及于謫常逰韓吏部門杜牧李商隠俱有擬沈下賢詩盖甚為當時名輩器重云有集九巻𫝊世李廓宰相程之子也少有志勲業攬轡慨然而未肯屑就遂困塲屋中作下第詩曰榜前潜制淚衆裏獨嫌身氣味如中酒情懐似别人時流皆稱賞且憐之因共推挽元和十三年獨孤樟榜進士調司經局正字出為鄠縣令累厯顯宦仕終武寜節度使政有竒績按新唐書廓為武寜節度不能治軍為軍所逐原文所云非事實也工詩極綺緻與賈島友善集今傳張祐字承吉南陽人來寓姑蘇樂髙尚稱處士騷情雅思凡知己者悉當時英傑然不業程文元和長慶間深為令狐文公器許鎮天平日自草表薦以詩三百首獻于朝辭畧曰凡製五言苞含六義近多放誕靡有宗師祜乆在江湖早工篇什研幾甚苦捜象頗深輩流所推風格罕及謹今繕錄詣光順門進獻望宣付中書門下祜至京師屬元稹號有城府偃仰内廷上因召問祜之詞藻上下稹曰張祜雕蟲小巧壯夫不為若奬激太過恐變陛下風教上頷之由是寂寞而歸為詩自悼云賀知章口徒勞説孟浩然身更不疑遂客淮南杜牧時為度支使極相善待有贈云何人得似張公子千首詩輕萬户侯祜苦吟妻孥每喚之皆不應曰吾方口吻生花豈恤汝輩乎性愛山水多逰名寺如杭之靈隠天竺蘇之靈巖楞伽常之惠山善權潤之甘露招隠往往題詠唱絶同時崔涯亦工詩與祐齊名頗自放行樂或乗興北里毎題詩倡肆譽之則聲價頓増毁之則車馬掃跡涯尚義有俠詩云太行嶺上三尺雪崔涯袖中三尺鐡一朝若遇有心人出門便與妻兒别嘗共謁淮南李相祜稱釣鼇客李怪之曰釣鼇以何為竿曰以虹以何為鈎曰新月以何為餌曰以短李相公也紳壯之厚贈而去晚與白樂天日相聚讌謔樂天譏以足下新作憶柘枝云鴛鴦鈿帶抛何處孔雀羅衫付阿誰乃欵頭詩耳祜曰鄙薄之誚是也君明皇長恨歌曰上窮碧落下黄泉兩處茫茫都不見又非目連尋母邪一座大笑初過廣陵題曰十里長街市井連月明橋上看神仙人生只合揚州死禪智山光好墓田大中中果卒於丹陽隠居人以為䜟云詩一巻今𫝊論曰衛蘧伯玉恥獨為君子令狐公其庶幾元稹則不然矣十譽不足一毁有餘其事業淺深于此可以觀人也爾所不知人其舍諸稹謂祐雕蟲璅璅而稹所為有不若是耶忌賢嫉能迎户而噬畧已而過人者穿窬之行也祜能以處士自終其身聲華不借鐘鼎而髙視當代至今稱之不遇者天也不泯者亦天也豈若取容阿附遺臭之不已者哉熊儒登鍾陵人有詩名元和中為西川從事與白舍人釗善多贈答亦祗役湘中數年凡下筆言語妙天下如江流如箭月如弓行盡三湘數夜中無奈子規知向蜀一聲聲似怨春風又經古墓云碑折松枯山火燒夜臺曽閉不曽朝那將逝者比流水流水東流逢上潮類此極多有集今𫝊徐凝按唐詩紀事凝睦州人有詩名無進取之意始逰長安不忍自衒鬻竟不成名將歸以詩辭韓吏部云一生所遇惟元白天下無人重布衣欲别朱門淚先盡白頭逰子白身歸按此𫝊有闕文韓琮字成封長慶四年李郡榜進士後大中中仕至湖南觀察使有詩名多清新之製錦綺不如也滻水送别云緑暗紅稀出鳯城暮雲樓閣古今情行人莫聴宫前水流盡年光是此聲駱谷晚望云秦州如畫渭如絲去國還家一望時公子王孫莫來好嶺花多是斷腸枝如此等皆喧滿人口餘極多皆稱是集一巻今𫝊韋楚老按唐詩紀事楚老長慶進士工詩氣既沈雄語亦豪健作祖龍吟曰黒雲兵氣射天裂壯士朝眠夢寃結祖龍一夜死沙丘胡亥空隨鮑魚轍腐肉偷生二千里偽書先賜扶蘇死墓接驪山土未乾瑞光已向芒碭起陳勝城中鼔三下秦家天地如崩瓦龍蛇撩亂入咸陽少帝空隨漢家馬按此𫝊有文唐才子傳巻四
